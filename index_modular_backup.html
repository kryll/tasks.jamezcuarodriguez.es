<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusDeck - GTD Productivity</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">

    <!-- 1. Cargar Estilos (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>

    <!-- 2. Cargar React y Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Cargar Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-gray-50 text-gray-900 dark:text-white dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>

    <!-- 4. Componentes y Lógica de la Aplicación -->
    <script src="js/constants.js"></script>
    <script type="text/babel" src="js/api.js"></script>
    <script type="text/babel" src="js/context.js"></script>
    <script type="text/babel" src="js/components/Icons.js"></script>
    <script type="text/babel" src="js/components/UI.js"></script>
    <script type="text/babel" src="js/components/TaskComponents.js"></script>
    <script type="text/babel" src="js/components/ClientComponents.js"></script>
    <script type="text/babel" src="js/components/ProjectComponents.js"></script>
    <script type="text/babel" src="js/components/OtherComponents.js"></script>
    <script type="text/babel" src="js/app.js"></script>
</body>

</html>
