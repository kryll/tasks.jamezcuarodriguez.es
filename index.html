<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusDeck - GTD Productivity</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">

    <!-- 1. Cargar Estilos (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>

    <!-- 2. Cargar React y Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Cargar Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Estilos base y animaciones */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in-right {
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Scrollbar oculta para elementos internos */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Date picker custom style */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
        }

        .dark input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }
    </style>
</head>

<body
    class="bg-gray-50 text-gray-900 dark:text-white dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        /*******************************************************
         * CONFIGURACIÓN
         *******************************************************/
        const USE_REAL_API = true;
        const API_URL = '/api';
        const NOTIFICATION_EMAIL = 'jamezcua@arsys.es';

        const { useState, useEffect, useMemo, useContext, createContext, useRef } = React;

        // --- 1. ADAPTADOR DE ICONOS ---
        const Icon = ({ name, size = 24, className, ...props }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                    {iconData.map(([tag, attrs], i) => { const Tag = tag; return <Tag key={i} {...attrs} />; })}
                </svg>
            );
        };

        const Icons = Object.keys(lucide.icons).reduce((acc, key) => {
            acc[key] = (props) => <Icon name={key} {...props} />;
            return acc;
        }, {});

        // --- 2. SERVICIO DE DATOS ---
        const generateId = () => Math.floor(Math.random() * 100000);

        const SERVICE_TYPES = [
            { id: 'cloudbuilder', label: 'CloudBuilder', prefix: 'cdc' },
            { id: 'next', label: 'CB Next', prefix: 'CB-' },
            { id: 'backup', label: 'Backup (BaaS)', prefix: 'BaaS-' },
            { id: 'dcd', label: 'DCD', prefix: 'DCD-' },
            { id: 'custom', label: 'URL Personalizada', prefix: 'https://' }
        ];

        const PROJECT_STATUSES = {
            'open': { label: 'Abierto', short: 'ABIERTO', color: 'bg-blue-100 text-blue-800 border-blue-200', dot: 'bg-blue-500' },
            'in_progress': { label: 'En Progreso', short: 'EN PROGRESO', color: 'bg-orange-100 text-orange-800 border-orange-200', dot: 'bg-orange-500' },
            'waiting': { label: 'En Espera', short: 'EN ESPERA', color: 'bg-yellow-100 text-yellow-800 border-yellow-200', dot: 'bg-yellow-500' },
            'closure': { label: 'Cierre de Proyecto', short: 'CIERRE', color: 'bg-purple-100 text-purple-800 border-purple-200', dot: 'bg-purple-500' },
            'closed': { label: 'Cierre Definitivo', short: 'CERRADO', color: 'bg-gray-100 text-gray-600 border-gray-200', dot: 'bg-gray-500' },
            'cancelled': { label: 'Cancelado', short: 'CANCELADO', color: 'bg-red-100 text-red-800 border-red-200', dot: 'bg-red-500' }
        };
        const getProjectStatus = (status) => {
            return PROJECT_STATUSES[status] || {
                label: status || 'Desconocido',
                short: (status || 'DESC').toUpperCase(),
                color: 'bg-gray-100 text-gray-600 border-gray-200',
                dot: 'bg-gray-400'
            };
        };
        // --- SUBTASK & TASK STATUSES ---
        const TASK_STATUSES = {
            'todo': { label: 'Pendiente', color: 'text-gray-400', icon: 'Square' },
            'in_progress': { label: 'En Curso', color: 'text-blue-500', icon: 'Loader' },
            'waiting_for': { label: 'En Espera', color: 'text-orange-500', icon: 'Clock' },
            'someday': { label: 'Algún día', color: 'text-purple-500', icon: 'Archive' },
            'done': { label: 'Completado', color: 'text-green-500', icon: 'CheckSquare' }
        };

        const MOCK_DB = {
            clients: [], contexts: [], projects: [],
            tasks: [
                { id: 1, title: 'Prueba Prioridad Interactiva (Click P1)', priority: 'high', status: 'todo', project_id: null, is_today: true },
                { id: 2, title: 'Prueba Enlaces: https://example.com', priority: 'medium', status: 'todo', description: 'Descripción con enlace https://google.com para verificar el linkify.' },
                { id: 3, title: 'Tarea Bloqueada Visualmente', priority: 'low', status: 'todo', project_id: null }
            ],
            dependencies: [
                { task_id: 3, blocked_by_task_id: 1 }
            ],
            projectLogs: [],
            subtasks: [
                { id: 101, task_id: 2, title: 'Subtarea con https://link.com', status: 'todo' }
            ]
        };

        // --- API HELPERS ---
        const handleApiError = async (res) => {
            if (!res.ok) {
                let errorMsg = res.status + ' ' + res.statusText;
                try {
                    const json = await res.json();
                    if (json.error) errorMsg = json.error;
                } catch (e) { }
                throw new Error(errorMsg);
            }
            return res.json();
        };

        const api = {
            async getDashboard() {
                if (!USE_REAL_API) return new Promise(r => setTimeout(() => r(MOCK_DB), 300));
                try {
                    const res = await fetch(`${API_URL}/dashboard`);
                    return handleApiError(res);
                } catch (e) {
                    console.warn("API Error", e);
                    if (USE_REAL_API) alert("⚠️ Error conectando con la Base de Datos:\n" + e.message);
                    // return MOCK_DB;
                }
            },
            async createTask(task) {
                if (!USE_REAL_API) return { ...task, id: generateId() };
                try { const res = await fetch(`${API_URL}/tasks`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(task) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error guardando tarea: " + e.message); throw e; }
            },
            async updateTask(id, updates) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error actualizando tarea: " + e.message); }
            },
            async deleteTask(id) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/tasks/${id}`, { method: 'DELETE' }); return handleApiError(res); } catch (e) { console.error(e); alert("Error borrando tarea: " + e.message); }
            },
            async createProject(project) {
                if (!USE_REAL_API) return { ...project, id: generateId() };
                try { const res = await fetch(`${API_URL}/projects`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(project) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error creando proyecto: " + e.message); throw e; }
            },
            async updateProject(id, updates) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/projects/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error actualizando proyecto: " + e.message); }
            },
            async deleteProject(id) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/projects/${id}`, { method: 'DELETE' }); return handleApiError(res); } catch (e) { console.error(e); alert("Error borrando proyecto: " + e.message); }
            },
            async createClient(client) {
                if (!USE_REAL_API) return { ...client, id: generateId(), contacts: [], services: [], docs: [], monitoring: [] };
                try { const res = await fetch(`${API_URL}/clients`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(client) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error creando cliente: " + e.message); throw e; }
            },
            async updateClient(id, updates) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/clients/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error actualizando cliente: " + e.message); }
            },
            async createContext(context) {
                if (!USE_REAL_API) return { ...context, id: generateId() };
                try { const res = await fetch(`${API_URL}/contexts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(context) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error creando contexto: " + e.message); throw e; }
            },
            async deleteContext(id) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/contexts/${id}`, { method: 'DELETE' }); return handleApiError(res); } catch (e) { console.error(e); alert("Error borrando contexto: " + e.message); }
            },
            async addDependency(dep) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/dependencies`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dep) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error añadiendo dependencia: " + e.message); }
            },
            async deleteDependency(taskId, blockerId) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/dependencies?task_id=${taskId}&blocked_by=${blockerId}`, { method: 'DELETE' }); return handleApiError(res); } catch (e) { console.error(e); alert("Error borrando dependencia: " + e.message); }
            },
            async addProjectLog(log) {
                if (!USE_REAL_API) return { ...log, id: generateId(), created_at: new Date() };
                try { const res = await fetch(`${API_URL}/project_logs`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(log) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error guardando log: " + e.message); throw e; }
            },
            async createSubtask(subtask) {
                if (!USE_REAL_API) return { ...subtask, id: generateId(), status: 'todo' };
                try { const res = await fetch(`${API_URL}/subtasks`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(subtask) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error creando subtarea: " + e.message); throw e; }
            },
            async updateSubtask(id, updates) {
                if (!USE_REAL_API) return;

                // YA NO FILTRAMOS: Ahora enviamos todo, incluido status_comment
                try {
                    const res = await fetch(`${API_URL}/subtasks/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updates)
                    });
                    return handleApiError(res);
                } catch (e) {
                    console.error(e);
                    alert("Error actualizando subtarea: " + e.message);
                }
            },
            async deleteSubtask(id) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/subtasks/${id}`, { method: 'DELETE' }); return handleApiError(res); } catch (e) { console.error(e); alert("Error borrando subtarea: " + e.message); }
            },
            async reorderSubtasks(orderedIds) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/subtasks/reorder`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ orderedIds }) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error reordenando subtareas: " + e.message); }
            },
            async updateSettings(settings) {
                if (!USE_REAL_API) return;
                try { const res = await fetch(`${API_URL}/settings`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(settings) }); return handleApiError(res); } catch (e) { console.error(e); alert("Error actualizando configuración: " + e.message); }
            },
            async triggerDailyReport() {
                try { const res = await fetch(`${API_URL}/test-email`); return handleApiError(res); } catch (e) { alert("Error: " + e.message); }
            },
            async triggerWeeklyReport() {
                try { const res = await fetch(`${API_URL}/test-weekly-report`); return handleApiError(res); } catch (e) { alert("Error: " + e.message); }
            },
            async triggerScheduledReport() {
                try { const res = await fetch(`${API_URL}/test-scheduled-report`); return handleApiError(res); } catch (e) { alert("Error: " + e.message); }
            }
        };

        const parseSmartTask = (text) => {
            const now = new Date();
            let title = text;
            let scheduled_date = null;
            let is_today = false;
            let reminder_freq = null;
            let detected = false;

            const regexRecurrence = /\bcada\s+([a-zA-Zñáéíóú]+)(\s+a\s+las\s+(\d{1,2}:\d{2}))?/i;
            const matchRecurrence = title.match(regexRecurrence);
            if (matchRecurrence) {
                const freq = matchRecurrence[1];
                const time = matchRecurrence[3];
                reminder_freq = `Cada ${freq}${time ? ` a las ${time}` : ''}`;
                title = title.replace(matchRecurrence[0], '').trim();
                detected = true;
            }

            if (!reminder_freq) {
                const regexTime = /\ba\s+las\s+(\d{1,2}:\d{2})\b/i;
                const matchTime = title.match(regexTime);
                if (matchTime) {
                    const specific_time = matchTime[1];
                    reminder_freq = `A las ${specific_time}`;
                    title = title.replace(matchTime[0], '').trim();
                    detected = true;
                    if (!scheduled_date && !title.match(/\b(mañana)\b/i)) { is_today = true; }
                }
            }

            const regexTomorrow = /\b(mañana)\b/i;
            if (regexTomorrow.test(title)) {
                const d = new Date(now); d.setDate(d.getDate() + 1);
                scheduled_date = d.toISOString().split('T')[0];
                title = title.replace(regexTomorrow, '').trim();
                detected = true;
                is_today = false;
            }

            const regexToday = /\b(hoy)\b/i;
            if (regexToday.test(title)) {
                is_today = true;
                title = title.replace(regexToday, '').trim();
                detected = true;
                scheduled_date = null;
            }

            return { title, scheduled_date, is_today, reminder_freq, detected };
        };

        const AppContext = createContext(null);

        // --- COMPONENTS ---

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, size = 'md', type = 'button' }) => {
            const base = "flex items-center justify-center rounded-lg font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2";
            const sizes = { xs: "px-2 py-0.5 text-xs", sm: "px-2 py-1 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700",
                ghost: "text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 dark:text-gray-400 dark:hover:text-white",
                danger: "bg-red-100 text-red-600 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-400",
                success: "bg-green-600 text-white hover:bg-green-700"
            };
            return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const Modal = ({ title, onClose, children, maxWidth = "max-w-lg" }) => (
            <div className="fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 animate-in">
                <div className={`bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full ${maxWidth} overflow-hidden border border-gray-100 dark:border-gray-700 max-h-[90vh] flex flex-col`}>
                    <div className="flex justify-between items-center p-4 border-b dark:border-gray-700 shrink-0">
                        <h3 className="font-semibold text-lg dark:text-white">{title}</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><Icons.X size={20} /></button>
                    </div>
                    <div className="p-4 overflow-y-auto custom-scrollbar">{children}</div>
                </div>
            </div>
        );

        const NotificationToast = ({ notifications, onClose }) => (
            <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
                {notifications.map(n => (
                    <div key={n.id} className="bg-white dark:bg-slate-800 border-l-4 border-blue-500 shadow-xl p-4 rounded flex items-start gap-3 w-80 slide-in-right pointer-events-auto">
                        <div className="text-blue-500 shrink-0"><Icons.Bell size={20} /></div>
                        <div className="flex-1 min-w-0">
                            <h4 className="font-bold text-sm text-gray-900 dark:text-white dark:text-white truncate">{n.title}</h4>
                            <p className="text-xs text-gray-600 dark:text-gray-300 break-words">{n.message}</p>
                        </div>
                        <button onClick={() => onClose(n.id)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"><Icons.X size={16} /></button>
                    </div>
                ))}
            </div>
        );

        const PriorityBadge = ({ priority, onClick }) => {
            const colors = {
                high: 'text-red-600 bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-900/30',
                medium: 'text-orange-600 bg-orange-50 dark:bg-orange-900/20 border-orange-100 dark:border-orange-900/30',
                low: 'text-blue-600 bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-900/30'
            };
            return (
                <button
                    onClick={onClick}
                    className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase border ${colors[priority]} ${onClick ? 'cursor-pointer hover:opacity-80' : ''}`}
                >
                    {priority === 'high' ? 'P1' : priority === 'medium' ? 'P2' : 'P3'}
                </button>
            );
        };

        const Linkify = ({ text }) => {
            if (!text) return null;
            const urlRegex = /((?:https?:\/\/|www\.)[^\s]+)/g;
            const parts = text.split(urlRegex);
            return (
                <>
                    {parts.map((part, i) => {
                        if (part.match(urlRegex)) {
                            let href = part;
                            if (!href.startsWith('http')) href = 'https://' + href;
                            return <a key={i} href={href} target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline relative z-10" onClick={e => e.stopPropagation()}>{part}</a>;
                        }
                        return part;
                    })}
                </>
            );
        };

        const FocusModeOverlay = ({ task, onClose, onComplete }) => (
            <div className="fixed inset-0 z-[100] bg-white dark:bg-gray-900 flex flex-col items-center justify-center p-8 animate-in">
                <div className="max-w-3xl w-full text-center space-y-6">
                    <div className="inline-block px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold tracking-wider mb-4">MODO ENFOQUE</div>
                    <h1 className="text-3xl md:text-5xl font-bold text-gray-900 dark:text-white dark:text-white leading-tight">{task.title}</h1>
                    {task.description && <div className="text-xl text-gray-500 dark:text-gray-400">{task.description}</div>}
                    <div className="flex justify-center gap-4 pt-8">
                        <Button size="lg" variant="ghost" onClick={onClose}>Pausar / Volver</Button>
                        <Button size="lg" className="px-8" onClick={() => onComplete(task.id)}><Icons.Check size={20} className="mr-2" /> Completar Tarea</Button>
                    </div>
                </div>
            </div>
        );

        const StatusLogModal = ({ isOpen, onClose, onConfirm }) => {
            const [comment, setComment] = useState('');
            if (!isOpen) return null;

            return (
                <Modal title="Actualización de Estado" onClose={() => onConfirm(undefined)}>
                    <div className="space-y-4">
                        <p className="text-sm text-gray-600 dark:text-gray-300">¿Deseas añadir un comentario al diario del proyecto sobre este cambio?</p>
                        <textarea
                            className="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                            rows="3"
                            placeholder="Comentario opcional..."
                            value={comment}
                            onChange={e => setComment(e.target.value)}
                        />
                        <div className="flex justify-end gap-2">
                            <Button variant="ghost" onClick={() => onConfirm(undefined)}>Cancelar</Button>
                            <Button variant="secondary" onClick={() => onConfirm(null)}>Omitir</Button>
                            <Button onClick={() => { onConfirm(comment); setComment(''); }}>Guardar</Button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const ProjectJournal = ({ projectId }) => {
            const { projectLogs, addProjectLog } = useContext(AppContext);
            const [newLog, setNewLog] = useState('');
            const [isExpanded, setIsExpanded] = useState(false);
            const logs = useMemo(() => projectLogs.filter(l => l.project_id === projectId), [projectLogs, projectId]);
            const handleAddLog = async () => { if (!newLog.trim()) return; await addProjectLog({ project_id: projectId, content: newLog }); setNewLog(''); };
            return (
                <div className="mt-4 border-t dark:border-gray-700 pt-4">
                    <button onClick={() => setIsExpanded(!isExpanded)} className="flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-blue-600 transition-colors mb-2"><Icons.BookOpen size={16} /> Diario de Proyecto ({logs.length}) <Icons.ChevronDown size={14} className={`transition-transform ${isExpanded ? 'rotate-180' : ''}`} /></button>

                    <div className="flex-1 overflow-y-auto pr-2 max-h-[350px]">
                        {activeTab === 'info' && (

                                <div className="bg-gray-50 dark:bg-slate-800/50 p-4 rounded-lg"><h5 className="text-xs font-bold uppercase text-gray-500 mb-2">Añadir Contacto</h5><div className="grid grid-cols-2 gap-2 mb-2"><input placeholder="Nombre" className="p-2 text-sm border rounded col-span-2 dark:bg-gray-700 dark:border-gray-600" value={newContact.name} onChange={e => setNewContact({ ...newContact, name: e.target.value })} /><input placeholder="Email" className="p-2 text-sm border rounded dark:bg-gray-700 dark:border-gray-600" value={newContact.email} onChange={e => setNewContact({ ...newContact, email: e.target.value })} /><input placeholder="Teléfono" className="p-2 text-sm border rounded dark:bg-gray-700 dark:border-gray-600" value={newContact.phone} onChange={e => setNewContact({ ...newContact, phone: e.target.value })} /></div><Button size="sm" onClick={handleAddContact} disabled={!newContact.name}><Icons.Plus size={14} className="mr-1" /> Añadir</Button></div>

                        {activeTab === 'tasks' && (

                                    )}
                                </div>

                                {/* Tareas Terminadas */}
                                {tasks.filter(t => t.status === 'done').length > 0 && (
                                    <details className="group border-t dark:border-gray-700 pt-3">
                                        <summary className="text-[10px] font-bold text-gray-400 uppercase tracking-wider cursor-pointer list-none hover:text-gray-600 flex items-center gap-2">
                                            <Icons.ChevronRight size={10} className="group-open:rotate-90 transition-transform" />
                                            Terminadas ({tasks.filter(t => t.status === 'done').length})
                                        </summary>
                                        <div className="mt-2 space-y-1 opacity-60">
                                            {tasks.filter(t => t.status === 'done').map(task => {
                                                const project = projects.find(p => p.id === task.project_id);
                                                return (
                                                    <div
                                                        key={task.id}
                                                        onClick={() => onEditTask(task)}
                                                        className="p-2 border rounded border-dashed flex justify-between items-center bg-gray-50 dark:bg-gray-800/50 cursor-pointer hover:bg-white dark:hover:bg-gray-800"
                                                    >
                                                        <div className="flex flex-col">
                                                            <span className="text-xs line-through text-gray-500">{task.title}</span>
                                                            {project && <span className="text-[8px] text-gray-400">#{project.name}</span>}
                                                        </div>
                                                        <span className="text-[8px] uppercase px-1 rounded bg-gray-100 dark:bg-gray-700">Done</span>
                                                    </div>

                                            })}

                                    </details>
                                )}
                            </div>

                    </div>

            return (
                <Modal title={isTam ? "Ficha Técnica Cliente TAM" : "Detalle Cliente Estándar"} onClose={onClose} maxWidth="max-w-5xl">
                    {isTam ? (
                        <div className="flex flex-col md:flex-row gap-6">
                            <div className="md:w-1/3 space-y-6">
                                {renderHeader()}
                                {/* REPLACED HARDCODED SERVICES WITH ServicesManager */}
                                <ServicesManager
                                    services={client.services || []}
                                    onUpdate={(updatedServices) => onUpdateClient(client.id, { services: updatedServices })}
                                />
                            </div>
                            <div className="md:w-2/3 flex flex-col gap-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {renderDocs()}
                                    <div className="bg-gray-50 dark:bg-slate-800/50 p-4 rounded-xl border dark:border-gray-700">
                                        <div className="flex justify-between items-center mb-3"><h4 className="text-xs font-bold uppercase text-gray-500 flex items-center gap-2"><Icons.Activity size={14} /> Monitorización</h4><button onClick={() => setAddMode(addMode === 'monitor' ? null : 'monitor')} className="text-gray-400 hover:text-blue-500"><Icons.PlusCircle size={16} /></button></div>
                                        {addMode === 'monitor' && (<div className="mb-2 p-2 bg-white dark:bg-slate-800 rounded border animate-in"><input placeholder="Título" className="w-full p-1 mb-1 text-xs border rounded dark:bg-gray-700" value={newMonitor.title} onChange={e => setNewMonitor({ ...newMonitor, title: e.target.value })} /><input placeholder="https://..." className="w-full p-1 mb-1 text-xs border rounded dark:bg-gray-700" value={newMonitor.url} onChange={e => setNewMonitor({ ...newMonitor, url: e.target.value })} /><Button size="xs" onClick={handleAddMonitor}>Añadir</Button></div>)}
                                        <div className="space-y-1">{client.monitoring && client.monitoring.map((mon, idx) => (<div key={idx} className="flex justify-between items-center group"><a href={mon.url} target="_blank" className="text-sm text-green-600 hover:underline flex items-center gap-2 truncate"><Icons.ExternalLink size={12} /> {mon.title}</a><button onClick={() => handleRemoveItem('monitoring', idx)} className="text-red-400 opacity-0 group-hover:opacity-100"><Icons.X size={12} /></button></div>))}</div>
                                    </div>
                                </div>
                                {renderContactsAndTasks()}
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col md:flex-row gap-6">
                            <div className="md:w-1/3 space-y-6">
                                {renderHeader()}
                                {renderDocs()}
                                <div className="bg-gray-50 dark:bg-slate-800/50 p-4 rounded-xl border dark:border-gray-700">
                                    <h4 className="text-xs font-bold uppercase text-gray-500 mb-3 flex items-center gap-2"><Icons.Layout size={14} /> Proyectos Activos</h4>
                                    <div className="space-y-2">
                                        {activeProjects.length > 0 ? activeProjects.map(prj => (
                                            <div key={prj.id} onClick={() => onNavigateProject(prj.id)} className="bg-white dark:bg-slate-800 p-2 rounded border dark:border-gray-600 shadow-sm flex items-center gap-2 cursor-pointer hover:bg-blue-50 dark:hover:bg-gray-700 transition-colors group">
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: prj.color }}></div><span className="text-sm font-medium dark:text-white group-hover:text-blue-600">{prj.name}</span><Icons.ChevronRight size={12} className="ml-auto text-gray-400 opacity-0 group-hover:opacity-100" />
                                            </div>

                                    </div>
                                </div>

                                        <h4 className="text-xs font-bold uppercase text-gray-500 mb-3 flex items-center gap-2"><Icons.Archive size={14} /> Histórico Proyectos</h4>
                                        <div className="space-y-2">{completedProjects.map(prj => (<div key={prj.id} className="text-xs text-gray-500 flex items-center gap-2 opacity-75"><Icons.Check size={10} className="text-green-500" /><span className="line-through">{prj.name}</span></div>))}</div>
                                    </div>
                                )}

                            <div className="md:w-2/3 flex flex-col gap-6">{renderContactsAndTasks()}</div>

        };

        const CreateContextModal = ({ onClose, onSave }) => {
            const [name, setName] = useState('');
            return (
                <Modal title="Nuevo Contexto" onClose={onClose}>
