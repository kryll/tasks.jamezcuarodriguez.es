                </Modal>
            );
        };

        const SubtaskListQuickAdd = ({ taskId }) => {
            const { addSubtask } = useContext(AppContext);
            const [title, setTitle] = useState('');

            const handleKeyDown = async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!title.trim()) return;
                    await addSubtask({ task_id: taskId, title });
                    setTitle('');
                }
            };

            const handleClick = async () => {
                if (!title.trim()) return;
                await addSubtask({ task_id: taskId, title });
                setTitle('');
            }

            return (
                <div className="flex items-center gap-2 mt-2">
                    <Icons.Plus size={14} className="text-gray-400" />
                    <input
                        type="text"
                        className="flex-1 bg-transparent border-none outline-none text-sm text-gray-600 dark:text-gray-300 placeholder-gray-400"
                        placeholder="Añadir paso..."
                        value={title}
                        onChange={(e) => setTitle(e.target.value)}
                        onKeyDown={handleKeyDown}
                    />
                    {title && (
                        <button onClick={handleClick} className="text-blue-500 hover:text-blue-700"><Icons.ArrowRight size={14} /></button>
                    )}
                </div>
            );
        }

        const SubtaskStatusSelect = ({ status, comment, onChange }) => {
            const current = TASK_STATUSES[status] || TASK_STATUSES['todo'];
            const [isOpen, setIsOpen] = useState(false);
            const ref = useRef(null);
            const [position, setPosition] = useState({ top: 0, left: 0 });
            const [localComment, setLocalComment] = useState(comment || '');

            useEffect(() => { setLocalComment(comment || ''); }, [comment]);

            // Close on click outside
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (ref.current && !ref.current.contains(event.target) && !event.target.closest('.subtask-dropdown-menu')) {
                        setIsOpen(false);
                    }
                };
                if (isOpen) document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [isOpen]);

            const toggle = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isOpen && ref.current) {
                    const rect = ref.current.getBoundingClientRect();
                    // Ajustar posición si se sale de la pantalla (simple check)
                    const top = rect.bottom + 5;
                    setPosition({
                        top: top,
                        left: rect.left
                    });
                }
                setIsOpen(!isOpen);
            };

            const handleSelect = (key) => {
                onChange(key, localComment);
                setIsOpen(false);
            };

            const renderIcon = (iconName, size = 16) => {
                switch (iconName) {
                    case 'CheckSquare': return <Icons.CheckSquare size={size} />;
                    case 'CheckCircle': return <Icons.CheckCircle size={size} />;
                    case 'Loader': return <Icons.Loader size={size} className="animate-spin-slow" />;
                    case 'Clock': return <Icons.Clock size={size} />;
                    case 'Archive': return <Icons.Archive size={size} />;
                    case 'Square': return <Icons.Square size={size} />;
                    default: return <Icons.Circle size={size} />;
                }
            };

            const tooltip = `${current.label}${comment ? `\n\nNota: ${comment}` : ''}`;

            return (
                <>
                    <button
                        ref={ref}
                        onClick={toggle}
                        className={`p-0.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors ${current.color}`}
                        title={tooltip}
                    >
                        {renderIcon(current.icon, 16)}
                    </button>

                    {isOpen && ReactDOM.createPortal(
                        <div
                            className="subtask-dropdown-menu fixed bg-white dark:bg-slate-800 rounded-lg shadow-xl border dark:border-gray-700 z-[9999] py-1 w-40 overflow-hidden animate-in fade-in zoom-in-95 duration-100"
                            style={{ top: position.top, left: position.left }}
                            onClick={(e) => e.stopPropagation()}
                        >
                            {['todo', 'in_progress', 'waiting_for', 'done'].map((key) => {
                                const val = TASK_STATUSES[key];
                                return (
                                    <button
                                        key={key}
                                        onClick={() => handleSelect(key)}
                                        className={`w-full text-left px-3 py-2 text-xs hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center gap-2 ${key === status ? 'bg-blue-50 dark:bg-blue-900/20 font-bold' : ''} ${val.color}`}
                                    >
                                        {renderIcon(val.icon, 14)}
                                        {val.label}
                                    </button>
                                );
                            })}
                            <div className="p-2 border-t dark:border-gray-700">
                                <textarea
                                    className="w-full text-xs p-1 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200 resize-none outline-none focus:border-blue-500 transition-colors"
                                    placeholder="Comentario opcional..."
                                    rows="2"
                                    value={localComment}
                                    onChange={e => setLocalComment(e.target.value)}
                                    onClick={e => e.stopPropagation()}
                                />
                            </div>
                        </div>,
                        document.body
                    )}
                </>
            );
        };

        const TaskItem = ({ task, onToggle, onSetFocus, onEdit, isBlocked, blockedBy, contextName, projectName, clientName, clientId, onSelectClient, onSelectProject, onDelete, onAddToDay }) => {
            const { subtasks, updateSubtask, updateTask, tasks, dependencies } = useContext(AppContext);
            const [isHovered, setIsHovered] = useState(false);
            const [isExpanded, setIsExpanded] = useState(false);
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            const [tempTitle, setTempTitle] = useState(task.title);

            // Subtasks logic for display
            const taskSubtasks = subtasks
                .filter(s => s.task_id === task.id)
                .sort((a, b) => (a.position || 0) - (b.position || 0));

            const completedSubtasks = taskSubtasks.filter(s => s.status === 'done').length;
            const totalSubtasks = taskSubtasks.length;
            const progress = totalSubtasks > 0 ? (completedSubtasks / totalSubtasks) * 100 : 0;

            const getStatusIcon = () => {
                if (task.status === 'done') return <div className="bg-green-500 text-white rounded-full p-0.5"><Icons.Check size={12} /></div>;
                if (task.status === 'waiting_for') return <Icons.Clock size={16} className="text-orange-500" />;
                if (task.status === 'someday') return <Icons.Archive size={16} className="text-purple-400" />;
                if (isBlocked) return <Icons.Lock size={16} className="text-gray-400" />;
                if (isFutureScheduled) return <div className="w-4 h-4 rounded-full border-2" style={{ borderColor: 'rgb(168 85 247)' }} />;
                return <div className={`w-4 h-4 rounded-full border-2 ${task.priority === 'high' ? 'border-red-500' : task.priority === 'medium' ? 'border-orange-500' : 'border-gray-300'}`} />;
            };

            // Wrapper for status change logic
            const { changeTaskStatusWithLog } = useContext(AppContext);
            const handleSubtaskStatusChange = (sub, newStatus, newComment) => {
                updateSubtask(sub.id, { status: newStatus, status_comment: newComment });
            };

            // Priority Cycle
            const cyclePriority = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const map = { high: 'medium', medium: 'low', low: 'high' };
                const newPriority = map[task.priority] || 'medium';
                updateTask(task.id, { priority: newPriority }); // Using updateTask from context
            };

            // Dependency Logic (Local calculation for better visibility)
            const activeBlockers = dependencies
                .filter(d => d.task_id === task.id)
                .map(d => tasks.find(t => t.id === d.blocked_by_task_id))
                .filter(t => t && t.status !== 'done');

            const isReallyBlocked = activeBlockers.length > 0;
            const isFutureScheduled = useMemo(() => {
                if (!task.scheduled_date) return false;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                return new Date(task.scheduled_date) > today;
            }, [task.scheduled_date]);

            return (
                <div className={`group flex flex-col p-3 mb-2 rounded-lg bg-white dark:bg-slate-800 border transition-all ${isReallyBlocked ? 'opacity-60 bg-gray-50 dark:bg-gray-900 border-red-100 dark:border-red-900/30' : isFutureScheduled ? 'border-dashed border-orange-200 dark:border-orange-900/50 bg-orange-50/10 dark:bg-orange-900/5' : 'border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md'}`} onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}>
                    <div className="flex items-start gap-3">
                        <button onClick={() => !isReallyBlocked && onToggle(task.id)} disabled={isReallyBlocked} className={`flex-shrink-0 w-6 h-6 mt-1 flex items-center justify-center rounded-full transition-colors ${isReallyBlocked ? 'cursor-not-allowed' : 'cursor-pointer'}`}>{getStatusIcon()}</button>
                        <div className="flex flex-col flex-1 min-w-0">
                            <div className="flex items-center gap-2">
                                {isEditingTitle ? (
                                    <input
                                        autoFocus
                                        className="flex-1 bg-transparent border-b border-blue-500 outline-none text-gray-800 dark:text-gray-100 font-medium"
                                        value={tempTitle}
                                        onChange={e => setTempTitle(e.target.value)}
                                        onBlur={() => {
                                            if (tempTitle.trim() && tempTitle !== task.title) {
                                                updateTask(task.id, { title: tempTitle });
                                            }
                                            setIsEditingTitle(false);
                                        }}
                                        onKeyDown={e => {
                                            if (e.key === 'Enter') {
                                                if (tempTitle.trim() && tempTitle !== task.title) {
                                                    updateTask(task.id, { title: tempTitle });
                                                }
                                                setIsEditingTitle(false);
                                            } else if (e.key === 'Escape') {
                                                setTempTitle(task.title);
                                                setIsEditingTitle(false);
                                            }
                                        }}
                                    />
                                ) : (
                                    <span
                                        onClick={() => setIsEditingTitle(true)}
                                        className={`font-medium truncate cursor-text ${task.status === 'done' ? 'line-through text-gray-400' : 'text-gray-800 dark:text-slate-200 dark:text-gray-100'}`}
                                        title={task.title}
                                    >
                                        <Linkify text={task.title} />
                                    </span>
                                )}
                                {contextName && <span className="flex-shrink-0 text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-300">@{contextName}</span>}
                                {task.status === 'waiting_for' && task.reminder_freq && <span className="flex items-center text-[10px] text-orange-600 bg-orange-50 dark:bg-orange-900/20 px-1.5 py-0.5 rounded"><Icons.Bell size={10} className="mr-1" /> {task.reminder_freq}</span>}
                                {task.scheduled_date && (
                                    <span
                                        className={isFutureScheduled ? `flex items-center text-[10px] px-1.5 py-0.5 rounded font-bold` : `flex items-center text-[10px] px-1.5 py-0.5 rounded font-bold text-orange-600 bg-orange-50 dark:bg-orange-900/20`}
                                        style={isFutureScheduled ? { color: 'rgb(168 85 247)', backgroundColor: 'rgba(168, 85, 247, 0.1)', border: '1px solid rgba(168, 85, 247, 0.2)' } : {}}
                                        title="Programada"
                                    >
                                        <Icons.Calendar size={10} className="mr-1" />
                                        {isFutureScheduled && "PROGRAMADA: "}
                                        {new Date(task.scheduled_date).toLocaleDateString()}
                                    </span>
                                )}
                            </div>

                            {/* Description Preview */}
                            {task.description && <div className="text-xs text-gray-500 dark:text-gray-400 mt-1 line-clamp-2"><Linkify text={task.description} /></div>}

                            <div className="flex items-center gap-3 text-xs text-gray-500 mt-1">
                                {isReallyBlocked && (
                                    <div className="text-red-500 flex flex-col gap-0.5">
                                        {activeBlockers.map(b => (
                                            <span key={b.id} className="flex items-center gap-1 font-semibold"><Icons.Lock size={10} /> Bloqueado por: {b.title}</span>
                                        ))}
                                    </div>
                                )}
                                {!isReallyBlocked && projectName && (
                                    <span
                                        className="flex items-center gap-1 text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 px-1 rounded hover:underline cursor-pointer"
                                        onClick={(e) => { e.stopPropagation(); if (task.project_id && onSelectProject) onSelectProject(task.project_id); }}
                                    >
                                        <Icons.Hash size={10} /> {projectName}
                                    </span>
                                )}
                                {!isReallyBlocked && clientName && <span className="flex items-center gap-1 text-purple-600 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/20 px-1 rounded hover:underline cursor-pointer" onClick={(e) => { e.stopPropagation(); if (clientId && onSelectClient) onSelectClient(clientId); }}><Icons.User size={10} /> {clientName}</span>}
                            </div>
                        </div>
                        <div className={`flex items-start gap-2 ${isHovered || task.status === 'waiting_for' ? 'opacity-100' : 'opacity-0 md:opacity-100'} transition-opacity`}>
                            {totalSubtasks > 0 ? (
                                <button onClick={() => setIsExpanded(!isExpanded)} className="p-1.5 text-gray-400 hover:text-blue-600 rounded transition-colors"><Icons.ChevronDown size={16} className={`transition-transform ${isExpanded ? 'rotate-180' : ''}`} /></button>
                            ) : (
                                <button onClick={() => setIsExpanded(!isExpanded)} className="p-1.5 text-gray-400 hover:text-green-600 rounded transition-colors" title="Añadir subtarea rápida"><Icons.Plus size={16} /></button>
                            )}
                            <button onClick={() => onAddToDay(task.id)} className={`p-1.5 rounded transition-colors ${task.is_today ? 'text-yellow-500 hover:bg-yellow-50 dark:hover:bg-yellow-900/20' : 'text-gray-400 hover:text-yellow-500 hover:bg-gray-100 dark:hover:bg-gray-700'}`} title={task.is_today ? "Quitar de Mi Día" : "Añadir a Mi Día"}><Icons.Sun size={16} fill={task.is_today ? "currentColor" : "none"} /></button>
                            <button onClick={() => onEdit(task)} className="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded transition-colors"><Icons.Edit2 size={16} /></button>
                            <button onClick={(e) => { e.stopPropagation(); onDelete(task.id); }} className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors"><Icons.Trash2 size={16} /></button>
                            {task.status !== 'done' && <Button variant="ghost" size="sm" onClick={() => onSetFocus(task)} className="p-1.5"><Icons.Zap size={16} className="text-yellow-500" /></Button>}
                            <PriorityBadge priority={task.priority} onClick={cyclePriority} />
                        </div>
                    </div>

                    {/* SUBTASK PROGRESS & LIST */}
                    {(totalSubtasks > 0 || isExpanded) && (
                        <div className="mt-2 ml-9">
                            {totalSubtasks > 0 && (
                                <>
                                    <div className="flex items-center gap-2 text-[10px] text-gray-500 mb-1">
                                        <span>Subtareas: {completedSubtasks}/{totalSubtasks}</span>
                                    </div>
                                    <div className="h-1.5 w-full bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden mb-2">
                                        <div className="h-full bg-blue-500 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                    </div>
                                </>
                            )}

                            {/* INLINE SUBTASKS */}
                            {isExpanded && (
                                <div className="space-y-1 pl-2 border-l-2 border-gray-200 dark:border-gray-700 animate-in">
                                    {taskSubtasks.map(sub => (
                                        <div key={sub.id} className="flex items-start gap-2 py-1">
                                            <SubtaskStatusSelect status={sub.status} comment={sub.status_comment} onChange={(val, comm) => handleSubtaskStatusChange(sub, val, comm)} />
                                            <div className="flex-1 min-w-0 pt-0.5">
                                                <div className={`text-sm ${sub.status === 'done' ? 'line-through text-gray-400' : 'text-gray-700 dark:text-gray-300'}`}><Linkify text={sub.title} /></div>
                                                {sub.description && <div className="text-xs text-gray-500 dark:text-gray-400"><Linkify text={sub.description} /></div>}
                                            </div>
                                        </div>
                                    ))}
                                    {/* QUICK ADD SUBTASK */}
                                    <SubtaskListQuickAdd taskId={task.id} />
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const SubtaskList = ({ taskId }) => {
            const { subtasks, addSubtask, updateSubtask, deleteSubtask, reorderSubtasks, setSubtasks, changeTaskStatusWithLog } = useContext(AppContext);
            const [newSubtaskTitle, setNewSubtaskTitle] = useState('');
            const [newSubtaskDesc, setNewSubtaskDesc] = useState('');
            const [editSubtaskId, setEditSubtaskId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editDesc, setEditDesc] = useState('');

            // Filtrar y ORDENAR por posición
            const taskSubtasks = subtasks
                .filter(s => s.task_id === taskId)
                .sort((a, b) => (a.position || 0) - (b.position || 0));

            const handleAdd = async () => {
                if (!newSubtaskTitle.trim()) return;
                await addSubtask({ task_id: taskId, title: newSubtaskTitle, description: newSubtaskDesc });
                setNewSubtaskTitle('');
                setNewSubtaskDesc('');
            };

            const startEdit = (sub) => {
                setEditSubtaskId(sub.id);
                setEditTitle(sub.title);
                setEditDesc(sub.description || '');
            };

            const saveEdit = async (id) => {
                await updateSubtask(id, { title: editTitle, description: editDesc });
                setEditSubtaskId(null);
            };

            // NUEVA LÓGICA DE MOVIMIENTO
            const moveSubtask = (index, direction) => {
                const newOrder = [...taskSubtasks];
                if (direction === 'up' && index > 0) {
                    [newOrder[index], newOrder[index - 1]] = [newOrder[index - 1], newOrder[index]];
                } else if (direction === 'down' && index < newOrder.length - 1) {
                    [newOrder[index], newOrder[index + 1]] = [newOrder[index + 1], newOrder[index]];
                } else { return; }

                const updatedGlobalSubtasks = subtasks.map(s => {
                    const foundInNewOrder = newOrder.findIndex(item => item.id === s.id);
                    if (foundInNewOrder !== -1) return { ...s, position: foundInNewOrder };
                    return s;
                });

                setSubtasks(updatedGlobalSubtasks);
                reorderSubtasks(newOrder.map(s => s.id));
            };

            const handleStatusChange = (sub, newStatus, newComment) => {
                updateSubtask(sub.id, { status: newStatus, status_comment: newComment });
            };

            return (
                <div className="mt-4 pt-4 border-t dark:border-gray-700 pb-24">
                    <h5 className="text-xs font-bold uppercase text-gray-500 mb-2">Checklist / Subtareas</h5>
                    <div className="space-y-2 mb-3">
                        {taskSubtasks.map((sub, index) => (
                            <div key={sub.id} className="flex flex-col gap-2 p-2 bg-gray-50 dark:bg-gray-700/50 rounded-lg group transition-all">
                                {editSubtaskId === sub.id ? (
                                    <div className="space-y-2">
                                        <input className="w-full p-1 text-sm border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={editTitle} onChange={e => setEditTitle(e.target.value)} autoFocus />
                                        <textarea className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white resize-none" rows="2" placeholder="Descripción de subtarea..." value={editDesc} onChange={e => setEditDesc(e.target.value)} />
                                        <div className="flex justify-end gap-2">
                                            <Button size="xs" variant="ghost" onClick={() => setEditSubtaskId(null)}><Icons.X size={14} /></Button>
                                            <Button size="xs" onClick={() => saveEdit(sub.id)}><Icons.Check size={14} /></Button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex items-start gap-2">
                                        <div className="flex flex-col gap-0.5 mt-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => moveSubtask(index, 'up')} disabled={index === 0} className="text-gray-400 hover:text-blue-500 disabled:opacity-30 disabled:cursor-not-allowed"><Icons.ChevronUp size={12} /></button>
                                            <button onClick={() => moveSubtask(index, 'down')} disabled={index === taskSubtasks.length - 1} className="text-gray-400 hover:text-blue-500 disabled:opacity-30 disabled:cursor-not-allowed"><Icons.ChevronDown size={12} /></button>
                                        </div>

                                        <SubtaskStatusSelect status={sub.status} comment={sub.status_comment} onChange={(val, comm) => handleStatusChange(sub, val, comm)} />

                                        <div className="flex-1 min-w-0 pt-0.5">
                                            <div className={`text-sm ${sub.status === 'done' ? 'line-through text-gray-400' : 'text-gray-700 dark:text-gray-200'}`}><Linkify text={sub.title} /></div>
                                            {sub.description && <div className="text-xs text-gray-500 dark:text-gray-400 truncate"><Linkify text={sub.description} /></div>}
                                        </div>
                                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => startEdit(sub)} className="text-gray-400 hover:text-blue-500"><Icons.Edit2 size={14} /></button>
                                            <button onClick={() => deleteSubtask(sub.id)} className="text-gray-400 hover:text-red-500"><Icons.Trash2 size={14} /></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                    <div className="flex flex-col gap-2">
                        <input className="w-full p-1.5 text-sm border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Añadir paso..." value={newSubtaskTitle} onChange={(e) => setNewSubtaskTitle(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleAdd(); }} />
                        {newSubtaskTitle && (<textarea className="w-full p-1.5 text-xs border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white resize-none" rows="2" placeholder="Descripción (opcional)..." value={newSubtaskDesc} onChange={(e) => setNewSubtaskDesc(e.target.value)} />)}
                        <Button type="button" size="sm" onClick={handleAdd} disabled={!newSubtaskTitle}><Icons.Plus size={16} /> Añadir Subtarea</Button>
                    </div>
                </div>
            );
        };

        const TaskEditModal = ({ task, onClose, onOpenWaitModal }) => {
            const { updateTask, projects, clients, contexts, dependencies, addDependency, removeDependency, tasks } = useContext(AppContext);
            const [formData, setFormData] = useState({ ...task });
            const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
            const handleSave = () => { const isNewWaitingFor = formData.status === 'waiting_for' && task.status !== 'waiting_for'; updateTask(task.id, formData); onClose(); if (isNewWaitingFor) setTimeout(() => onOpenWaitModal(task), 100); };

            const taskBlockers = dependencies.filter(d => d.task_id === task.id);

            // Filtrar tareas disponibles para bloquear:
            // 1. No ser la misma tarea
            // 2. No estar ya añadida como bloqueo
            // 3. NO estar completada (NUEVO)
            const availableTasks = tasks.filter(t =>
                t.id !== task.id &&
                t.status !== 'done' &&
                !taskBlockers.find(d => d.blocked_by_task_id === t.id)
            );

            // Agrupar: Relacionadas (mismo proyecto/cliente) vs Otras
            const relatedTasks = availableTasks.filter(t => {
                if (task.project_id && t.project_id === task.project_id) return true;
                if (task.client_id && t.client_id === task.client_id) return true;
                return false;
            });

            const otherTasks = availableTasks.filter(t => !relatedTasks.includes(t));

            return (
                <Modal title="Editar Tarea" onClose={onClose}>
                    <div className="space-y-4">
                        <div>
                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Título</label>
                            <input type="text" value={formData.title} onChange={(e) => handleChange('title', e.target.value)} className="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" />
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Descripción</label>
                            <textarea rows="3" value={formData.description || ''} onChange={(e) => handleChange('description', e.target.value)} className="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Detalles de la tarea..."></textarea>
                        </div>
                        <div className="grid grid-cols-2 gap-4"><div><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Prioridad</label><div className="flex gap-2">{['high', 'medium', 'low'].map(p => (<button key={p} onClick={() => handleChange('priority', p)} className={`flex-1 py-1 text-xs rounded border ${formData.priority === p ? 'bg-gray-100 dark:bg-gray-600 border-gray-400 font-bold' : 'border-gray-200 dark:border-gray-700'}`}>{p === 'high' ? '🔴' : p === 'medium' ? '🟠' : '🔵'}</button>))}</div></div><div><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Estado</label><select value={formData.status} onChange={(e) => handleChange('status', e.target.value)} className="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white text-sm"><option value="todo">Próxima Acción</option><option value="in_progress">En Progreso</option><option value="waiting_for">En Espera</option><option value="someday">Algún día/Quizás</option><option value="done">Completado</option></select></div></div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Proyecto / Cliente</label>
                            {(() => {
                                const projGroups = {};
                                projects.forEach(p => {
                                    const client = clients.find(c => c.id === p.client_id);
                                    const comp = client ? client.company : (p.company || 'Otros');
                                    if (!projGroups[comp]) projGroups[comp] = [];
                                    projGroups[comp].push(p);
                                });

                                const tamClients = clients.filter(c => c.type === 'TAM_premium');
                                const stdClientGroups = {};
                                clients.filter(c => c.type === 'standard').forEach(c => {
                                    const comp = c.company || 'Otros';
                                    if (!stdClientGroups[comp]) stdClientGroups[comp] = [];
                                    stdClientGroups[comp].push(c);
                                });

                                return (
                                    <select
                                        value={formData.project_id || (formData.client_id ? `client-${formData.client_id}` : '')}
                                        onChange={(e) => {
                                            const val = e.target.value;
                                            if (val.startsWith('client-')) {
                                                handleChange('client_id', parseInt(val.replace('client-', '')));
                                                handleChange('project_id', null);
                                            } else if (val) {
                                                handleChange('project_id', parseInt(val));
                                                handleChange('client_id', null);
                                            } else {
                                                handleChange('project_id', null);
                                                handleChange('client_id', null);
                                            }
                                        }}
                                        className="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white text-sm"
                                    >
                                        <option value="">-- Sin Proyecto (Inbox) --</option>

                                        {Object.entries(projGroups).map(([comp, projs]) => (
                                            <optgroup key={`proj-${comp}`} label={`PROYECTOS - ${comp.toUpperCase()}`}>
                                                {projs.map(p => <option key={p.id} value={p.id}># {p.name}</option>)}
                                            </optgroup>
                                        ))}

                                        {tamClients.length > 0 && (
                                            <optgroup label="CLIENTES TAM">
                                                {tamClients.map(c => <option key={c.id} value={`client-${c.id}`}>👑 {c.name}</option>)}
                                            </optgroup>
                                        )}

                                        {Object.entries(stdClientGroups).map(([comp, cls]) => (
                                            <optgroup key={`cli-${comp}`} label={`CLIENTES - ${comp.toUpperCase()}`}>
                                                {cls.map(c => <option key={c.id} value={`client-${c.id}`}>🏢 {c.name}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                );
                            })()}
                        </div>
                        <div><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Contexto</label><div className="flex flex-wrap gap-2">{contexts.map(ctx => (<button key={ctx.id} onClick={() => handleChange('context_id', formData.context_id === ctx.id ? null : ctx.id)} className={`px-3 py-1 rounded-full text-sm border flex items-center gap-2 ${formData.context_id === ctx.id ? 'bg-blue-100 border-blue-300 text-blue-800 dark:bg-blue-900 dark:text-blue-200' : 'bg-gray-50 border-gray-200 text-gray-600 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400'}`}><Icons.Tag size={12} /> {ctx.name}</button>))}</div></div>

                        <div className="pt-2 border-t dark:border-gray-700">
                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Bloqueos y Dependencias</label>
                            <div className="space-y-2 mb-2">
                                {taskBlockers.map(d => {
                                    const blocker = tasks.find(t => t.id === d.blocked_by_task_id);
                                    return (
                                        <div key={d.blocked_by_task_id} className="flex justify-between items-center text-xs bg-red-50 dark:bg-red-900/20 p-2 rounded text-red-700 dark:text-red-300">
                                            <span className="flex items-center gap-1"><Icons.Lock size={12} /> Bloqueada por: {blocker?.title || 'Tarea desconocida'}</span>
                                            <button onClick={() => removeDependency(task.id, d.blocked_by_task_id)} className="hover:text-red-900 dark:hover:text-red-100"><Icons.X size={14} /></button>
                                        </div>
                                    )
                                })}
                            </div>
                            <select
                                className="w-full p-2 text-xs border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                onChange={(e) => {
                                    if (e.target.value) {
                                        addDependency(task.id, parseInt(e.target.value));
                                        e.target.value = '';
                                    }
                                }}
                            >
                                <option value="">Añadir bloqueo (esta tarea depende de...)</option>
                                {relatedTasks.length > 0 && (
                                    <optgroup label="Relacionadas (Mismo Proyecto/Cliente)">
                                        {relatedTasks.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                                    </optgroup>
                                )}
                                {otherTasks.length > 0 && (
                                    <optgroup label="Otras Tareas">
                                        {otherTasks.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                                    </optgroup>
                                )}
                            </select>
                        </div>

                        <div className="pt-2 border-t dark:border-gray-700"><label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Programación (Tickler)</label><div className="flex items-center gap-2"><span className="text-gray-500"><Icons.Calendar size={16} /></span><input type="date" className="w-full p-2 text-sm border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white" value={formData.scheduled_date ? new Date(formData.scheduled_date).toISOString().split('T')[0] : ''} onChange={(e) => handleChange('scheduled_date', e.target.value)} /></div><p className="text-[10px] text-gray-400 mt-1">La tarea permanecerá oculta en "Programadas" hasta esta fecha.</p></div>

                        {/* SUBTASKS SECTION */}
                        <SubtaskList taskId={task.id} />

                        <div className="pt-4 flex justify-end gap-2"><Button variant="ghost" onClick={onClose}>Cancelar</Button><Button variant="primary" onClick={handleSave}>Guardar</Button></div>
                    </div>
                </Modal>
            );
        };

        const WaitingForModal = ({ task, onSave, onCancel }) => {
            const [recurrence, setRecurrence] = useState('daily');
            const [customDays, setCustomDays] = useState(2);
            const [customTime, setCustomTime] = useState('09:30');
            const handleSave = () => { let result = ''; if (recurrence === 'daily') result = 'Diariamente (09:30)'; else if (recurrence === 'weekly') result = 'Semanalmente (Lunes)'; else if (recurrence === 'none') result = ''; else if (recurrence === 'custom') result = `Cada ${customDays} días a las ${customTime}`; onSave(result); };
            return (
                <Modal title="Configurar Recordatorio" onClose={onCancel}>
                    <div className="space-y-4"><p className="text-sm text-gray-600 dark:text-gray-300">Has marcado "{task.title}" como <strong>En Espera</strong>.</p><div className="space-y-2">{[{ id: 'daily', label: 'Diariamente (09:30 AM)' }, { id: 'weekly', label: 'Semanalmente (Lunes)' }, { id: 'none', label: 'Sin recordatorio' }].map((opt) => (<label key={opt.id} className={`flex items-center space-x-3 p-3 rounded-lg border cursor-pointer ${recurrence === opt.id ? 'bg-blue-50 border-blue-500 dark:bg-blue-900/20' : 'border-gray-200 dark:border-gray-700'}`}><input type="radio" name="recurrence" value={opt.id} checked={recurrence === opt.id} onChange={(e) => setRecurrence(e.target.value)} className="text-blue-600" /><span className="text-gray-800 dark:text-slate-200 dark:text-gray-200 font-medium text-sm">{opt.label}</span></label>))}
                        <div className={`rounded-lg border transition-colors ${recurrence === 'custom' ? 'bg-blue-50 border-blue-500 dark:bg-blue-900/20 dark:border-blue-500' : 'border-gray-200 dark:border-gray-700'}`}><label className="flex items-center space-x-3 p-3 cursor-pointer"><input type="radio" name="recurrence" value="custom" checked={recurrence === 'custom'} onChange={(e) => setRecurrence(e.target.value)} className="text-blue-600 focus:ring-blue-500" /><span className="text-gray-800 dark:text-slate-200 dark:text-gray-200 font-medium text-sm">Personalizado</span></label>{recurrence === 'custom' && (<div className="px-3 pb-3 ml-7 space-y-3 animate-in"><div className="flex items-center gap-2"><span className="text-sm text-gray-600 dark:text-gray-400">Cada</span><input type="number" min="1" value={customDays} onChange={e => setCustomDays(e.target.value)} className="w-16 p-1 border rounded text-center dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" /><span className="text-sm text-gray-600 dark:text-gray-400">días</span></div><div className="flex items-center gap-2"><span className="text-sm text-gray-600 dark:text-gray-400">A las</span><input type="time" value={customTime} onChange={e => setCustomTime(e.target.value)} className="p-1 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" /></div></div>)}</div>
                    </div><div className="flex justify-end gap-2 pt-2"><Button variant="ghost" onClick={onCancel}>Cancelar</Button><Button variant="primary" onClick={handleSave}>Guardar</Button></div></div>
                </Modal>
            );
        };

        const FocusDeckApp = () => {
            const [tasks, setTasks] = useState([]);
            const [projects, setProjects] = useState([]);
            const [clients, setClients] = useState([]);
            const [contexts, setContexts] = useState([]);
            const [dependencies, setDependencies] = useState([]);
            const [projectLogs, setProjectLogs] = useState([]);
            const [subtasks, setSubtasks] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [companies, setCompanies] = useState([{ name: 'Arsys', noClient: false }, { name: 'Cronon', noClient: false }]); // Default inicial

            const [view, setView] = useState('my_day');
            const [filterId, setFilterId] = useState(null);
            const [darkMode, setDarkMode] = useState(() => {
                if (typeof window !== 'undefined') {
                    return localStorage.getItem('theme') === 'dark';
                }
                return false;
            });
            const [searchQuery, setSearchQuery] = useState('');
            const [dailyBriefingDismissed, setDailyBriefingDismissed] = useState(false);
            const [isEditingProjectHeader, setIsEditingProjectHeader] = useState(false);
            const [showCompletedTasks, setShowCompletedTasks] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // ... (other state definitions if any in between, but grouping visually)

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [darkMode]);

            const [focusTask, setFocusTask] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [waitingModalTask, setWaitingModalTask] = useState(null);
            const [modalOpen, setModalOpen] = useState(null);
            const [selectedClientId, setSelectedClientId] = useState(null);
            const selectedClient = useMemo(() => clients.find(c => c.id === selectedClientId), [clients, selectedClientId]);
            const activeProjectData = useMemo(() => projects.find(p => p.id === filterId), [projects, filterId]);
            const activeClientData = useMemo(() => clients.find(c => c.id === filterId), [clients, filterId]);
            const activeContextData = useMemo(() => contexts.find(c => c.id === filterId), [contexts, filterId]);

            const getPendingCount = (type, id = null) => {
                const pending = tasks.filter(t => t.status !== 'done');
                const today = new Date().toISOString().split('T')[0];

                if (type === 'inbox') return pending.filter(t => !t.project_id && !t.client_id).length;
                if (type === 'my_day') return pending.filter(t => t.is_today).length;
                if (type === 'waiting') return pending.filter(t => t.status === 'waiting_for').length;
                if (type === 'scheduled') return pending.filter(t => t.scheduled_date && t.scheduled_date > today).length;
                if (type === 'project') return pending.filter(t => t.project_id === id).length;
                if (type === 'context') return pending.filter(t => t.context_id === id).length;
                return 0;
            };

            const Badge = ({ count }) => count > 0 ? (
                <span className="ml-auto bg-gray-200 dark:bg-slate-700 text-gray-600 dark:text-gray-400 text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[1.2rem] text-center border dark:border-gray-600">
                    {count}
                </span>
            ) : null;
            const [clientModalType, setClientModalType] = useState(null);

            const [newTaskInput, setNewTaskInput] = useState('');
            const [newTaskScheduledDate, setNewTaskScheduledDate] = useState('');
            const [showDatePicker, setShowDatePicker] = useState(false);

            // Log Modal State
            const [logModalOpen, setLogModalOpen] = useState(false);
            const [pendingStatusChange, setPendingStatusChange] = useState(null); // { item, newStatus, isSubtask }

            const addNotification = (title, message) => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, title, message }]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 4000);
            };

            const smartAttributes = useMemo(() => parseSmartTask(newTaskInput), [newTaskInput]);

            const briefingTasks = useMemo(() => {
                if (view !== 'my_day' || dailyBriefingDismissed) return { main: null, secondaries: [] };

                const today = new Date().toISOString().split('T')[0];
                const pending = tasks.filter(t =>
                    t.status !== 'done' &&
                    t.status !== 'waiting_for' &&
                    !t.scheduled_date &&
                    !t.is_today
                );

                if (pending.length === 0) return { main: null, secondaries: [] };

                const sorted = [...pending].sort((a, b) => {
                    const aPrio = a.priority === 'high' ? 3 : a.priority === 'medium' ? 2 : 1;
                    const bPrio = b.priority === 'high' ? 3 : b.priority === 'medium' ? 2 : 1;
                    if (aPrio !== bPrio) return bPrio - aPrio;

                    const aHasClient = (a.client_id || (a.project_id && projects.find(p => p.id === a.project_id && p.client_id))) ? 1 : 0;
                    const bHasClient = (b.client_id || (b.project_id && projects.find(p => p.id === b.project_id && p.client_id))) ? 1 : 0;
                    return bHasClient - aHasClient;
                });

                return {
                    main: sorted[0],
                    secondaries: sorted.slice(1, 4)
                };
            }, [tasks, view, dailyBriefingDismissed, projects]);

            useEffect(() => {
                api.getDashboard().then(data => {
                    setTasks(data.tasks);
                    setProjects(data.projects);
                    setClients(data.clients);
                    setContexts(data.contexts);
                    setDependencies(data.dependencies);
                    setProjectLogs(data.projectLogs || []);
                    setSubtasks(data.subtasks || []);

                    // Cargar compañías desde settings si existen
                    if (data.settings && data.settings.companies) {
                        try {
                            const parsed = JSON.parse(data.settings.companies);
                            // Migración/Normalización: asegurar que todos son objetos {name, noClient}
                            const normalized = (Array.isArray(parsed) ? parsed : []).map(c =>
                                typeof c === 'string' ? { name: c, noClient: false } : c
                            );
                            setCompanies(normalized);
                        } catch (e) { console.error("Error parsing companies", e); }
                    }
                });
            }, []);

            useEffect(() => { if (darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark'); }, [darkMode]);

            // --- NOTIFICATIONS LOGIC ---
            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted") {
                    Notification.requestPermission();
                }

                const checkReminders = () => {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const currentTime = `${hours}:${minutes}`;

                    tasks.forEach(t => {
                        if (t.status === 'waiting_for' && t.reminder_freq) {
                            // Simple substring match for time, e.g. "09:30" inside "Diariamente (09:30)"
                            if (t.reminder_freq.includes(currentTime)) {
                                // Prevent multiple triggers in same minute (simple debounce via stored state could be added, 
                                // but for now we rely on the minute changing. 
                                // To be robust, one would track 'lastNotified' timestamp in local state)

                                // Check if we already notified this task this minute (simple hack using a property on the object reference if kept in mem, or just risk one minute of potential re-trigger if re-renders happen)
                                // Better: user Notification 'tag' to replace existing or check timestamp.
                            }
                        }
                    });
                }

                // Run check every minute
                const interval = setInterval(() => {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const currentTime = `${hours}:${minutes}`;

                    tasks.forEach(t => {
                        if (t.status === 'waiting_for' && t.reminder_freq && t.reminder_freq.includes(currentTime)) {
                            // Basic debounce: assume check runs once per minute. 
                            // In real app, store 'lastNotified' in DB or local map.
                            if (Notification.permission === "granted") {
                                new Notification("🔔 FocusDeck: Recordatorio", {
                                    body: `Revisar tarea: ${t.title}`,
                                    icon: "https://emojicdn.elk.sh/🎯"
                                });
                            } else if (Notification.permission !== "denied") {
                                // Fallback to in-app toast
                                addNotification("🔔 Recordatorio", `Revisar tarea: ${t.title}`);
                            }
                        }
                    });
                }, 60000); // Check every 60s

                return () => clearInterval(interval);
            }, [tasks]);

            // Notification for scheduled tasks today
            const [hasNotifiedScheduled, setHasNotifiedScheduled] = useState(false);
            useEffect(() => {
                if (hasNotifiedScheduled || tasks.length === 0) return;
                // Use local date for "today" comparison to avoid timezone issues
                const today = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
                const todaysScheduled = tasks.filter(t => t.scheduled_date === today && t.status !== 'done');
                if (todaysScheduled.length > 0) {
                    addNotification("Tareas Programadas", `Hoy tienes ${todaysScheduled.length} tareas programadas.`);
                    setHasNotifiedScheduled(true);
                }
            }, [tasks, hasNotifiedScheduled]);

            // CRUD wrappers...
            const addProject = async (data) => {
                const newP = await api.createProject(data);
                setProjects([...projects, newP]);
                setModalOpen(null);
                // ... (startup tasks logic same as before) ...
                const startupTaskData = { title: 'Inicio proyecto', priority: 'high', project_id: newP.id, description: 'Tareas iniciales de alta de proyecto', status: 'todo', is_today: false, client_id: null, context_id: null };
                const startupTask = await api.createTask(startupTaskData);
                setTasks(prev => [...prev, startupTask]);
                const subs = ["Creación Proyectos en Kimai", "Creación Proyecto Confluence"];
                for (const subTitle of subs) {
                    const savedSub = await api.createSubtask({ task_id: startupTask.id, title: subTitle });
                    setSubtasks(prev => [...prev, savedSub]);
                }
                const docTaskData = { title: 'Documentación', priority: 'medium', project_id: newP.id, status: 'todo', is_today: false, client_id: null, context_id: null };
                const docTask = await api.createTask(docTaskData);
                setTasks(prev => [...prev, docTask]);
            };

            const updateTaskLocal = async (id, updates) => { setTasks(prev => prev.map(t => t.id === id ? { ...t, ...updates } : t)); await api.updateTask(id, updates); };

            // Subtasks wrappers
            // FIXED: Added missing definition of addProjectLogLocal
            const addProjectLogLocal = async (logData) => {
                const savedLog = await api.addProjectLog(logData);
                setProjectLogs(prev => [savedLog, ...prev]);
            };

            const addSubtaskLocal = async (subtask) => { const saved = await api.createSubtask(subtask); setSubtasks(prev => [...prev, saved]); };
            const updateSubtaskLocal = async (id, updates) => { setSubtasks(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s)); await api.updateSubtask(id, updates); };
            const deleteSubtaskLocal = async (id) => { setSubtasks(prev => prev.filter(s => s.id !== id)); await api.deleteSubtask(id); };

            // Wrapper for addClient
            const addClient = async (data) => {
                const newClient = await api.createClient(data);
                setClients(prev => [...prev, newClient]);
                setModalOpen(null);
            };

            // Wrapper for updateClient
            const updateClientLocal = async (id, updates) => {
                setClients(prev => prev.map(c => c.id === id ? { ...c, ...updates } : c));
                await api.updateClient(id, updates);
            };
            const deleteTaskLocal = async (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
                await api.deleteTask(id);
            };

            // Wrapper for saveContext
            const saveContext = async (data) => {
                const newContext = await api.createContext(data);
                setContexts(prev => [...prev, newContext]);
                setModalOpen(null);
            };

            const deleteContext = async (id) => {
                if (confirm('¿Estás seguro de que deseas eliminar este contexto? Las tareas asociadas perderán su contexto.')) {
                    setContexts(prev => prev.filter(c => c.id !== id));
                    await api.deleteContext(id);
                }
            };

            const addDependencyLocal = async (taskId, blockerId) => {
                await api.addDependency({ task_id: taskId, blocked_by_task_id: blockerId });
                setDependencies(prev => [...prev, { task_id: taskId, blocked_by_task_id: blockerId }]);
                // AUTOMATIZACIÓN: Cambiar estado a 'waiting_for' si no lo está ya y no está completada
                const t = tasks.find(task => task.id === taskId);
                if (t && t.status !== 'done' && t.status !== 'waiting_for') {
                    await updateTaskLocal(taskId, { status: 'waiting_for' });
                }
            };

            const removeDependencyLocal = async (taskId, blockerId) => {
                await api.deleteDependency(taskId, blockerId);
                setDependencies(prev => prev.filter(d => !(d.task_id === taskId && d.blocked_by_task_id === blockerId)));
            };

            // CHANGE STATUS WITH LOG LOGIC
            const changeTaskStatusWithLog = (item, newStatus) => {
                // Determine if item (task or subtask) belongs to a project
                let projectId = null;
                let itemName = item.title;

                if (item.isSubtask) {
                    const parentTask = tasks.find(t => t.id === item.task_id);
                    if (parentTask && parentTask.project_id) projectId = parentTask.project_id;
                } else {
                    if (item.project_id) projectId = item.project_id;
                }

                if (projectId) {
                    // Open modal to ask for log
                    setPendingStatusChange({ item, newStatus, projectId, itemName });
                    setLogModalOpen(true);
                } else {
                    // No project, just update
                    performStatusUpdate(item, newStatus);
                }
            };

            const handleLogConfirm = async (comment) => {
                if (!pendingStatusChange) return;

                // Si comment es undefined, es que el usuario ha cancelado (X o botón Cancelar)
                if (comment === undefined) {
                    setLogModalOpen(false);
                    setPendingStatusChange(null);
                    return;
                }

                const { item, newStatus, projectId, itemName } = pendingStatusChange;

                // 1. Update status
                performStatusUpdate(item, newStatus);

                // 2. Add Log if comment provided
                if (comment && comment.trim()) {
                    const logContent = `[Estado: ${newStatus}] ${itemName}\n${comment}`;
                    const savedLog = await api.addProjectLog({ project_id: projectId, content: logContent });
                    setProjectLogs(prev => [savedLog, ...prev]);
                }

                setLogModalOpen(false);
                setPendingStatusChange(null);
            };

            const performStatusUpdate = (item, newStatus) => {
                if (item.isSubtask) {
                    updateSubtaskLocal(item.id, { status: newStatus });
                } else {
                    updateTaskLocal(item.id, { status: newStatus });
                }
            };

            const handleNavigateProject = (projectId) => {
                setView('project');
                setFilterId(projectId);
                setIsSidebarOpen(false);
                setSelectedClientId(null); // Close client modal if open
            };

            const updateProjectLocal = async (id, updates) => {
                setProjects(prev => prev.map(p => p.id === id ? { ...p, ...updates } : p));
                await api.updateProject(id, updates);
            };

            // ... (Rest of app logic: addTask, toggleTask, etc. mapped to new logic) ...

            // Updated addTask to use default priority 'medium'
            const addTask = async (e) => {
                e.preventDefault();
                if (!newTaskInput.trim()) return;

                if (view === 'project' && filterId) {
                    const blockingTask = tasks.find(t => t.project_id === filterId && t.status !== 'done' && t.title === 'Inicio proyecto');
                    if (blockingTask) { alert("No puedes crear nuevas tareas hasta completar la tarea 'Inicio proyecto'."); return; }
                }

                const finalTitle = smartAttributes.title;
                const finalScheduled = newTaskScheduledDate || smartAttributes.scheduled_date;
                const finalIsToday = (view === 'my_day') || smartAttributes.is_today;
                const finalRecurrence = smartAttributes.reminder_freq;

                const newTask = {
                    title: finalTitle,
                    status: 'todo',
                    priority: 'medium',
                    project_id: view === 'project' ? filterId : null,
                    client_id: view === 'client' ? filterId : null,
                    context_id: view === 'context' ? filterId : null,
                    is_today: finalIsToday,
                    scheduled_date: finalScheduled,
                    reminder_freq: finalRecurrence
                };

                const saved = await api.createTask(newTask);
                setTasks([saved, ...tasks]);
                setNewTaskInput('');
                setNewTaskScheduledDate('');
                setShowDatePicker(false);
                if (finalRecurrence) addNotification("Tarea Recurrente", `Se ha configurado: ${finalRecurrence}`);
                if (finalScheduled) addNotification("Tarea Programada", `Para el ${finalScheduled}`);
            };

            // Mapped toggleTask to new logic
            const toggleTask = (id) => {
                const t = tasks.find(t => t.id === id);
                if (t) changeTaskStatusWithLog(t, t.status === 'done' ? 'todo' : 'done');
            };

            const [showClosedProjects, setShowClosedProjects] = useState(false);

            // DINAMIC SIDEBAR LOGIC: Group projects by company
            const projectGroups = useMemo(() => {
                const groups = {};
                // Asegurar que todas las compañías configuradas tengan un grupo
                companies.forEach(company => {
                    const name = typeof company === 'string' ? company : company.name;
                    groups[name] = { active: [], inactive: [] };
                });

                projects.forEach(p => {
                    const client = clients.find(c => c.id === p.client_id);
                    const companyName = client ? client.company : (p.company || 'Sin Compañía');

                    if (!groups[companyName]) {
                        groups[companyName] = { active: [], inactive: [] };
                    }

                    const isInactive = p.status === 'finished' || p.status === 'cancelled' || p.status === 'on_hold' || p.status === 'closed';

                    if (isInactive) {
                        groups[companyName].inactive.push(p);
                    } else {
                        groups[companyName].active.push(p);
                    }
                });
                return groups;
            }, [projects, clients, companies, showClosedProjects]);

            // CLIENT DASHBOARD VARIABLES
            const tamClients = useMemo(() => clients.filter(c => c.type === 'TAM_premium'), [clients]);

            const activeStdClients = useMemo(() => {
                return clients.filter(c => {
                    if (c.type !== 'standard') return false;
                    // Un cliente es activo si tiene proyectos que NO están cerrados/finalizados
                    const clientProjs = projects.filter(p => p.client_id === c.id);
                    if (clientProjs.length === 0) return true; // Si no tiene proyectos, lo consideramos activo para que aparezca
                    return clientProjs.some(p => !['finished', 'cancelled', 'on_hold', 'closed'].includes(p.status));
                });
            }, [clients, projects]);

            const inactiveStdClients = useMemo(() => {
                return clients.filter(c => {
                    if (c.type !== 'standard') return false;
                    const clientProjs = projects.filter(p => p.client_id === c.id);
                    if (clientProjs.length === 0) return false;
                    return !clientProjs.some(p => !['finished', 'cancelled', 'on_hold', 'closed'].includes(p.status));
                });
            }, [clients, projects]);

            const arsysClients = useMemo(() => activeStdClients.filter(c => c.company === 'Arsys'), [activeStdClients]);
            const crononClients = useMemo(() => activeStdClients.filter(c => c.company === 'Cronon'), [activeStdClients]);
            const otherClients = useMemo(() => activeStdClients.filter(c => c.company !== 'Arsys' && c.company !== 'Cronon'), [activeStdClients]);

            // RE-INTRODUCED FILTERED TASKS LOGIC (FIX FOR SEARCH)
            const filteredTasks = useMemo(() => {
                let list = tasks;
                const today = new Date().toISOString().split('T')[0];

                if (view === 'search') {
                    const q = searchQuery.toLowerCase();
                    list = list.filter(t => t.title.toLowerCase().includes(q));
                }
                else if (view === 'scheduled') {
                    list = list.filter(t => t.scheduled_date && t.scheduled_date > today && t.status !== 'done');
                }
                else {
                    // Si estamos en una vista de "agrupación" (proyecto, cliente, contexto), 
                    // permitimos ver tareas programadas a futuro para que no "desaparezcan" al asignarles fecha.
                    const isGroupView = ['project', 'client_tasks', 'context', 'std_dashboard', 'inbox'].includes(view);

                    if (!isGroupView) {
                        list = list.filter(t => !t.scheduled_date || t.scheduled_date <= today);
                    }

                    if (view === 'my_day') list = list.filter(t => t.is_today && t.status !== 'done');
                    else if (view === 'inbox') list = list.filter(t => !t.project_id && !t.client_id && t.status !== 'done');
                    else if (view === 'someday') list = list.filter(t => t.status === 'someday');
                    else if (view === 'waiting') list = list.filter(t => t.status === 'waiting_for');
                    else if (view === 'project') list = list.filter(t => t.project_id === filterId);
                    else if (view === 'std_dashboard') list = list.filter(t => { if (!t.client_id && !t.project_id) return false; const client = t.client_id ? clients.find(c => c.id === t.client_id) : null; const project = t.project_id ? projects.find(p => p.id === t.project_id) : null; const pClient = project ? clients.find(c => c.id === project.client_id) : null; return (client && client.type === 'standard') || (pClient && pClient.type === 'standard'); });
                    else if (view === 'context') list = list.filter(t => t.context_id === filterId);
                    else if (view === 'client_tasks') list = list.filter(t => {
                        const project = t.project_id ? projects.find(p => p.id === t.project_id) : null;
                        const client = t.client_id ? clients.find(c => c.id === t.client_id) : (project ? clients.find(c => c.id === project.client_id) : null);
                        if (client && client.type === 'TAM_premium') return true;
                        if (!t.project_id && !t.client_id) return true;
                        const context = t.context_id ? contexts.find(c => c.id === t.context_id) : null;
                        if (context && context.name.toLowerCase().includes('personal')) return true;
                        return false;
                    });
                }

                if (view !== 'search' && !showCompletedTasks) {
                    // We don't filter out here anymore, we filter in the render part
                    // to allow calculating counts and showing them in the collapsed section.
                }

                return list.sort((a, b) => {
                    if (view === 'scheduled') return new Date(a.scheduled_date) - new Date(b.scheduled_date);
                    if (a.status === 'done' && b.status !== 'done') return 1;
