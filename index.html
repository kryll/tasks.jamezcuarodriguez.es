                                        )}

                                        {/* CRONON CLIENTS */}
                                        {crononClients.length > 0 && (
                                            <div>
                                                <h3 className="text-sm font-bold uppercase text-purple-600 dark:text-purple-400 mb-3 flex items-center gap-2"><Icons.Cpu size={16} /> Clientes Cronon</h3>
                                                <div className="grid gap-3">
                                                    {crononClients.map(client => { const clientTasks = tasks.filter(t => (t.client_id === client.id || (t.project_id && projects.find(p => p.id === t.project_id && p.client_id === client.id))) && t.status !== 'done').length; const activeProjs = projects.filter(p => p.client_id === client.id && !['closure', 'closed', 'cancelled'].includes(p.status)); const inactProjs = projects.filter(p => p.client_id === client.id && ['closure', 'closed', 'cancelled'].includes(p.status)); return (<div key={client.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-lg hover:shadow-md transition-shadow gap-4"><div className="flex items-center gap-3 w-full sm:w-1/3"><div className="p-2.5 bg-purple-50 dark:bg-purple-900/20 text-purple-600 rounded-lg"><Icons.Building size={24} /></div><div><h3 className="font-bold text-gray-800 dark:text-white leading-tight">{client.name}</h3><span className="text-xs text-gray-400 font-mono">ID: {client.custom_id || client.id}</span></div></div><div className="flex-1 flex flex-col gap-2">{activeProjs.length > 0 ? (<div className="flex flex-wrap gap-2">{activeProjs.map(p => (<span key={p.id} onClick={(e) => { e.stopPropagation(); handleNavigateProject(p.id); }} className="text-xs px-2 py-1 bg-purple-50 dark:bg-purple-900/20 text-purple-700 dark:text-purple-300 rounded border border-purple-100 dark:border-purple-800 flex items-center gap-1 cursor-pointer hover:bg-purple-100 dark:hover:bg-purple-800 transition-colors"><span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: p.color }}></span>{p.name}</span>))}</div>) : (<span className="text-xs text-gray-400 italic">Sin proyectos activos</span>)}{inactProjs.length > 0 && (<details className="group"><summary className="text-[10px] text-gray-400 hover:text-gray-600 cursor-pointer list-none flex items-center gap-1"><Icons.ChevronRight size={8} className="group-open:rotate-90 transition-transform" /> Inactivos ({inactProjs.length})</summary><div className="flex flex-wrap gap-1 mt-1">{inactProjs.map(p => (<span key={p.id} onClick={(e) => { e.stopPropagation(); handleNavigateProject(p.id); }} className="text-[10px] px-1.5 py-0.5 bg-gray-50 dark:bg-gray-900/40 text-gray-500 rounded border border-gray-100 dark:border-gray-800 cursor-pointer hover:bg-gray-100 opacity-70">{p.name}</span>))}</div></details>)}</div><div className="flex items-center gap-4 sm:w-auto w-full justify-between sm:justify-end border-t sm:border-0 pt-3 sm:pt-0 dark:border-gray-700"><div className="text-right"><div className="text-lg font-bold text-gray-700 dark:text-gray-300 leading-none">{clientTasks}</div><div className="text-[9px] uppercase text-gray-400">Activas</div></div><Button size="sm" variant="ghost" onClick={() => setSelectedClientId(client.id)}>Ver Detalles</Button></div></div>); })}
                                                </div>
                                            </div>
                                        )}

                                        {/* OTHER CLIENTS */}
                                        {otherClients.length > 0 && (
                                            <div>
                                                <h3 className="text-sm font-bold uppercase text-gray-500 mb-3 flex items-center gap-2"><Icons.Globe size={16} /> Otros Clientes</h3>
                                                <div className="grid gap-3">
                                                    {otherClients.map(client => { const clientTasks = tasks.filter(t => (t.client_id === client.id || (t.project_id && projects.find(p => p.id === t.project_id && p.client_id === client.id))) && t.status !== 'done').length; const activeProjs = projects.filter(p => p.client_id === client.id && !['closure', 'closed', 'cancelled'].includes(p.status)); const inactProjs = projects.filter(p => p.client_id === client.id && ['closure', 'closed', 'cancelled'].includes(p.status)); return (<div key={client.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-lg hover:shadow-md transition-shadow gap-4"><div className="flex items-center gap-3 w-full sm:w-1/3"><div className="p-2.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-lg"><Icons.Building size={24} /></div><div><h3 className="font-bold text-gray-800 dark:text-white leading-tight">{client.name}</h3><span className="text-xs text-gray-400 font-mono">ID: {client.custom_id || client.id}</span></div></div><div className="flex-1 flex flex-col gap-2">{activeProjs.length > 0 ? (<div className="flex flex-wrap gap-2">{activeProjs.map(p => (<span key={p.id} onClick={(e) => { e.stopPropagation(); handleNavigateProject(p.id); }} className="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded border border-gray-200 dark:border-gray-700 flex items-center gap-1 cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors"><span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: p.color }}></span>{p.name}</span>))}</div>) : (<span className="text-xs text-gray-400 italic">Sin proyectos activos</span>)}{inactProjs.length > 0 && (<details className="group"><summary className="text-[10px] text-gray-400 hover:text-gray-600 cursor-pointer list-none flex items-center gap-1"><Icons.ChevronRight size={8} className="group-open:rotate-90 transition-transform" /> Inactivos ({inactProjs.length})</summary><div className="flex flex-wrap gap-1 mt-1">{inactProjs.map(p => (<span key={p.id} onClick={(e) => { e.stopPropagation(); handleNavigateProject(p.id); }} className="text-[10px] px-1.5 py-0.5 bg-gray-50 dark:bg-gray-900/40 text-gray-500 rounded border border-gray-100 dark:border-gray-800 cursor-pointer hover:bg-gray-100 opacity-70">{p.name}</span>))}</div></details>)}</div><div className="flex items-center gap-4 sm:w-auto w-full justify-between sm:justify-end border-t sm:border-0 pt-3 sm:pt-0 dark:border-gray-700"><div className="text-right"><div className="text-lg font-bold text-gray-700 dark:text-gray-300 leading-none">{clientTasks}</div><div className="text-[9px] uppercase text-gray-400">Activas</div></div><Button size="sm" variant="ghost" onClick={() => setSelectedClientId(client.id)}>Ver Detalles</Button></div></div>); })}
                                                </div>
                                            </div>
                                        )}

                                        {/* INACTIVE CLIENTS */}
                                        {inactiveStdClients.length > 0 && (<details className="group mt-8"><summary className="flex items-center gap-2 text-sm font-semibold text-gray-500 cursor-pointer list-none hover:text-gray-700 dark:hover:text-gray-300 mb-4"><Icons.ChevronDown className="group-open:rotate-180 transition-transform" /> Clientes Inactivos ({inactiveStdClients.length})</summary><div className="grid gap-2 opacity-75">{inactiveStdClients.map(client => (<div key={client.id} className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 border border-dashed dark:border-gray-700 rounded-lg"><div className="flex items-center gap-3"><Icons.Building size={16} className="text-gray-400" /><span className="text-sm text-gray-600 dark:text-gray-400">{client.name}</span> <span className="text-[10px] uppercase bg-gray-100 dark:bg-gray-700 px-1 rounded text-gray-500">{client.company || 'N/A'}</span></div><Button size="xs" variant="ghost" onClick={() => setSelectedClientId(client.id)}>Ver Ficha</Button></div>))}</div></details>)}

                                    </div>
                                )}
                            </div>
                        </main>

                        <StatusLogModal isOpen={logModalOpen} onConfirm={handleLogConfirm} />
                        <NotificationToast notifications={notifications} onClose={(id) => setNotifications(prev => prev.filter(n => n.id !== id))} />

                        {/* Modals */}
                        {editingTask && <TaskEditModal task={editingTask} onClose={() => setEditingTask(null)} onOpenWaitModal={setWaitingModalTask} />}
                        {waitingModalTask && <WaitingForModal task={waitingModalTask} onCancel={() => setWaitingModalTask(null)} onSave={(f) => { updateTaskLocal(waitingModalTask.id, { reminder_freq: f }); setWaitingModalTask(null); addNotification("Recordatorio Configurado", `Te avisaremos: ${f}`); }} />}

                        {modalOpen === 'settings' && (
                            <Modal title="Configuración" onClose={() => setModalOpen(null)}>
                                <div className="space-y-6">
                                    <section>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Email de Notificaciones</label>
                                        <div className="flex gap-2">
                                            <input
                                                type="email"
                                                className="flex-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                                placeholder="tu@email.com"
                                                defaultValue={localStorage.getItem('notification_email') || ''}
                                                onBlur={async (e) => {
                                                    const email = e.target.value;
                                                    localStorage.setItem('notification_email', email);
                                                    await api.updateSettings({ notification_email: email });
                                                    addNotification("Ajustes Guardados", "Email actualizado correctamente");
                                                }}
                                            />
                                        </div>
                                    </section>

                                    <section className="pt-4 border-t dark:border-gray-700">
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-3">Pruebas de Reportes</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                            <Button size="sm" variant="outline" onClick={async () => {
                                                addNotification("Enviando...", "Generando reporte diario...");
                                                const res = await api.triggerDailyReport();
                                                if (res) addNotification("Enviado", "Reporte diario enviado con éxito");
                                            }}>
                                                <Icons.Mail className="mr-2" size={14} /> Reporte Diario
                                            </Button>
                                            <Button size="sm" variant="outline" onClick={async () => {
                                                addNotification("Enviando...", "Generando resumen semanal...");
                                                const res = await api.triggerWeeklyReport();
                                                if (res) addNotification("Enviado", "Resumen semanal enviado");
                                            }}>
                                                <Icons.BarChart2 className="mr-2" size={14} /> Resumen Semanal
                                            </Button>
                                            <Button size="sm" variant="outline" onClick={async () => {
                                                addNotification("Comprobando...", "Buscando tareas programadas...");
                                                const res = await api.triggerScheduledReport();
                                                if (res) {
                                                    if (res.count > 0) addNotification("Enviado", `${res.count} tareas enviadas`);
                                                    else addNotification("Sin Tareas", "No hay tareas para hoy");
                                                }
                                            }}>
                                                <Icons.Bell className="mr-2" size={14} /> Tareas Hoy
                                            </Button>
                                        </div>
                                    </section>

                                    <section className="pt-4 border-t dark:border-gray-700">
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Gestión de Compañías</label>
                                        <p className="text-[10px] text-gray-400 mb-3">Las compañías aquí añadidas crearán secciones automáticas en la barra lateral.</p>

                                        <div className="space-y-2 mb-3">
                                            {companies.map(c => (
                                                <div key={c.name} className="flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-700/50 rounded-lg group">
                                                    <div className="flex flex-col">
                                                        <span className="text-sm dark:text-gray-200 font-medium">{c.name}</span>
                                                        <label className="flex items-center gap-1.5 cursor-pointer mt-1">
                                                            <input
                                                                type="checkbox"
                                                                checked={c.noClient}
                                                                onChange={async (e) => {
                                                                    const newList = companies.map(item => item.name === c.name ? { ...item, noClient: e.target.checked } : item);
                                                                    setCompanies(newList);
                                                                    await api.updateSettings({ companies: JSON.stringify(newList) });
                                                                }}
                                                                className="w-3 h-3 rounded border-gray-300 text-blue-600"
                                                            />
                                                            <span className="text-[9px] text-gray-500 uppercase font-bold">Sin cliente requerido</span>
                                                        </label>
                                                    </div>
                                                    <button
                                                        onClick={async () => {
                                                            const newList = companies.filter(item => item.name !== c.name);
                                                            setCompanies(newList);
                                                            await api.updateSettings({ companies: JSON.stringify(newList) });
                                                        }}
                                                        className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
                                                    >
                                                        <Icons.Trash2 size={14} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="flex gap-2">
                                            <input
                                                id="new-company-input"
                                                type="text"
                                                placeholder="Nombre de la compañía..."
                                                className="flex-1 p-2 text-sm border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                                onKeyDown={async (e) => {
                                                    if (e.key === 'Enter' && e.target.value.trim()) {
                                                        const newName = e.target.value.trim();
                                                        if (companies.find(i => i.name === newName)) return;
                                                        const newList = [...companies, { name: newName, noClient: false }];
                                                        setCompanies(newList);
                                                        await api.updateSettings({ companies: JSON.stringify(newList) });
                                                        e.target.value = '';
                                                    }
                                                }}
                                            />
                                            <Button size="sm" onClick={async () => {
                                                const input = document.getElementById('new-company-input');
                                                if (input && input.value.trim()) {
                                                    const newName = input.value.trim();
                                                    if (companies.find(i => i.name === newName)) return;
                                                    const newList = [...companies, { name: newName, noClient: false }];
                                                    setCompanies(newList);
                                                    await api.updateSettings({ companies: JSON.stringify(newList) });
                                                    input.value = '';
                                                }
                                            }}>Añadir</Button>
                                        </div>
                                    </section>

                                    <div className="flex justify-end pt-4">
                                        <Button variant="primary" onClick={() => setModalOpen(null)}>Cerrar</Button>
                                    </div>
                                </div>
                            </Modal>
                        )}
                        {modalOpen === 'project' && <CreateProjectModal clients={clients} onClose={() => setModalOpen(null)} onSave={addProject} onRequestCreateClient={() => { setClientModalType('standard'); setModalOpen('client_rec'); }} companies={companies} />}
                        {modalOpen === 'client' && <CreateClientModal initialType={clientModalType} onClose={() => setModalOpen(null)} onSave={addClient} companies={companies} />}
                        {modalOpen === 'client_rec' && <CreateClientModal initialType="standard" onClose={() => setModalOpen('project')} onSave={async (data) => { await addClient(data); setModalOpen('project'); }} companies={companies} />}
                        {modalOpen === 'context' && <CreateContextModal onClose={() => setModalOpen(null)} onSave={saveContext} />}

                        {focusTask && <FocusModeOverlay task={focusTask} onClose={() => setFocusTask(null)} onComplete={(id) => { toggleTask(id); setFocusTask(null); }} />}
                        {selectedClient && <ClientDetailModal client={selectedClient} tasks={tasks.filter(t => t.client_id === selectedClient.id || (t.project_id && projects.find(p => p.id === t.project_id && p.client_id === selectedClient.id)))} projects={projects} onClose={() => setSelectedClientId(null)} onUpdateClient={updateClientLocal} onNavigateProject={handleNavigateProject} onEditTask={setEditingTask} />}
                    </div>
                </AppContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FocusDeckApp />);
    </script>
</body>

</html>
