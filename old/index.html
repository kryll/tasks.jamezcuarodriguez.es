        // --- HOOK: DATA (REST API) ---
        const useRestApi = () => {
            const [data, setData] = useState({ clients: [], projects: [], tasks: [], contexts: [], tamCustomers: [] });
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                try {
                    const [cRes, pRes, tRes, ctxRes, tamRes] = await Promise.all([
                        fetch(`${API_URL}?action=getClients`),
                        fetch(`${API_URL}?action=getProjects`),
                        fetch(`${API_URL}?action=getTasks`),
                        fetch(`${API_URL}?action=getContexts`),
                        fetch(`${API_URL}?action=getTamCustomers`)
                    ]);
                    
                    if(!cRes.ok || !pRes.ok || !tRes.ok || !ctxRes.ok) throw new Error('API Error');

                    let clients = await cRes.json();
                    let projects = await pRes.json();
                    let tasks = await tRes.json();
                    let contexts = await ctxRes.json();
                    let tamCustomers = tamRes.ok ? await tamRes.json() : [];

                    clients = clients.map(c => ({...c, hidden: c.hidden == 1 || c.hidden === "1" || c.hidden === true}));

                addTask: async (task) => { await fetch(`${API_URL}?action=addTask`, { method: 'POST', body: JSON.stringify(task) }); fetchData(); },
                
                // Optimistic Update Implementation
                updateTask: async (id, data) => {

                    setData(prev => ({

        };

-h-24 overflow-y-auto text-xs space-y-1">{p.journal?.map((j,i)=><div key={i} className="border-l-2 pl-2 border-slate-500"><span className="opacity-50">{new Date(j.date).toLocaleDateString()}:</span> {j.content}</div>)}</div>{!isCl && <div className="flex gap-2 mt-2"><Input value={ji} onChange={e=>setJi(e.target.value)} placeholder="Entrada..." className="h-7 text-xs"/><Button size="xs" onClick={()=>{if(ji){onUpdateJournal(p.id,ji);setJi('')}}}><Icons.Send size={12}/></Button></div>}</div></div>}</div>

                <div className="space-y-6 animate-in pb-20">
                    <header className="flex justify-between items-center"><h1 className="text-3xl font-bold">Clientes</h1><div className="flex gap-2"><Input placeholder="Nuevo Cliente..." value={newClientName} onChange={e => setNewClientName(e.target.value)} className="w-48"/><Button onClick={() => { onAddClient(newClientName); setNewClientName(''); }}><Icons.Plus size={16}/></Button></div></header>
                    <div className="grid gap-3">{sortedClients.map(c => { const { active, closed } = getClientStats(c.id); const isArchived = active === 0; return ( <div key={c.id} className={`flex items-center justify-between p-4 border rounded-lg transition-all ${isArchived ? 'bg-slate-100 dark:bg-slate-900 border-slate-200 dark:border-slate-800 opacity-60' : 'bg-white dark:bg-slate-800/50 border-slate-200 dark:border-slate-700'}`}><div className="flex items-center gap-3"><div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg ${isArchived ? 'bg-slate-200 dark:bg-slate-800 text-slate-500' : 'bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400'}`}>{c.name.charAt(0).toUpperCase()}</div><div><div className="flex items-center gap-2"><h3 className="font-semibold text-lg">{c.name}</h3>{isArchived && <span className="text-xs text-slate-500">(Archivado)</span>}</div><div className="flex gap-2 mt-1"><span className="text-xs px-2 py-0.5 rounded bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800">{active} Activos</span><span className="text-xs px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700">{closed} Cerrados</span></div></div></div><div className="flex items-center gap-2"><Button size="sm" variant="ghost" className="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20" onClick={() => { if(confirm('¿Eliminar cliente?')) onDeleteClient(c.id); }} title="Eliminar"><Icons.Trash2 size={18}/></Button></div></div> ); })}</div>
                    <div className="mt-8 pt-4 border-t border-slate-200 dark:border-slate-800 text-center"><button onClick={() => setShowArchived(!showArchived)} className="text-xs text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 underline">{showArchived ? "Ocultar clientes inactivos" : "Ver clientes inactivos"}</button></div>
                </div>
            )
        };

        const TamView = ({ tamCustomers, onAddTamCustomer, onDeleteTamCustomer }) => {
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ code: '', name: '', docs_url: '', services: { backup: false, vcenter: false, panels: [] } });
            const [panelName, setPanelName] = useState('');

            const handleAddPanel = () => { if (panelName) { setFormData(prev => ({...prev, services: {...prev.services, panels: [...prev.services.panels, {name: panelName}]}})); setPanelName(''); }};
            const handleCreate = () => { onAddTamCustomer(formData); setShowForm(false); setFormData({ code: '', name: '', docs_url: '', services: { backup: false, vcenter: false, panels: [] } }); };

            return (
                <div className="space-y-6 animate-in pb-20">
                    <header className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold">Clientes TAM</h1>
                        <Button onClick={() => setShowForm(!showForm)}><Icons.Plus size={16}/> Nuevo Cliente</Button>
                    </header>

                    {showForm && (
                        <div className="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg shadow-lg space-y-4 animate-in">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-bold text-slate-500">ID Cliente</label><Input value={formData.code} onChange={e=>setFormData({...formData, code: e.target.value})} placeholder="Ej: C-1234"/></div>
                                <div><label className="text-xs font-bold text-slate-500">Nombre</label><Input value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} placeholder="Nombre Cliente"/></div>
                            </div>
                            <div><label className="text-xs font-bold text-slate-500">URL Documentación</label><Input value={formData.docs_url} onChange={e=>setFormData({...formData, docs_url: e.target.value})} placeholder="https://..."/></div>
                            
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-500">Servicios</label>
                                <div className="flex gap-4">
                                    <label className="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked={formData.services.backup} onChange={e=>setFormData({...formData, services: {...formData.services, backup: e.target.checked}})} className="rounded border-slate-500"/> Panel Backup</label>
                                    <label className="flex items-center gap-2 cursor-pointer text-sm"><input type="checkbox" checked={formData.services.vcenter} onChange={e=>setFormData({...formData, services: {...formData.services, vcenter: e.target.checked}})} className="rounded border-slate-500"/> VCenter Dedicado</label>
                                </div>
                            </div>

                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-500">Paneles</label>
                                <div className="flex gap-2">
                                    <Input value={panelName} onChange={e=>setPanelName(e.target.value)} placeholder="Nombre del panel" className="h-8 text-sm"/>
                                    <Button size="sm" onClick={handleAddPanel}>Añadir</Button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {formData.services.panels.map((p, i) => <Badge key={i} className="bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">{p.name}</Badge>)}
                                </div>
                            </div>

                            <div className="flex justify-end gap-2 pt-2">
                                <Button variant="ghost" onClick={() => setShowForm(false)}>Cancelar</Button>
                                <Button onClick={handleCreate}>Crear Cliente</Button>
                            </div>
                        </div>
                    )}

                    <div className="grid gap-4">
                        {tamCustomers.map(c => (
                            <div key={c.id} className="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <div className="flex items-center gap-2">
                                            <h3 className="font-bold text-lg text-slate-800 dark:text-slate-100">{c.name}</h3>
                                            <Badge className="bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800">{c.code}</Badge>
                                        </div>
                                        {c.docs_url && <a href={c.docs_url} target="_blank" className="text-xs text-blue-500 hover:underline flex items-center gap-1 mt-1"><Icons.ExternalLink size={12}/> Documentación</a>}
                                    </div>
                                    <Button size="sm" variant="ghost" onClick={() => { if(confirm('¿Borrar cliente TAM?')) onDeleteTamCustomer(c.id); }} className="text-slate-400 hover:text-red-500"><Icons.Trash2 size={16}/></Button>
                                </div>
                                
                                <div className="mt-4 flex flex-wrap gap-2">
                                    {c.services.backup && <Badge className="bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300 border border-green-200 dark:border-green-800 flex gap-1"><Icons.HardDrive size={12}/> Backup</Badge>}
                                    {c.services.vcenter && <Badge className="bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 border border-purple-200 dark:border-purple-800 flex gap-1"><Icons.Server size={12}/> VCenter</Badge>}
                                    {c.services.panels && c.services.panels.map((p, i) => (
                                        <Badge key={i} className="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 flex gap-1"><Icons.LayoutDashboard size={12}/> {p.name}</Badge>
                                    ))}
                                </div>
                            </div>
                        ))}
                        {tamCustomers.length === 0 && <div className="text-center py-10 text-slate-500">No hay clientes TAM registrados.</div>}
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [view, setView] = useState('my-day');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(true);
            const { clients, projects, tasks, contexts, tamCustomers, loading, actions } = useRestApi();

            useEffect(() => { if (darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }, [darkMode]);

            // --- Logic Wrappers ---
            const addTaskWrapper = async (projectId, title, priority = 'medium', gtd_list = 'inbox', is_today = false, contextId = null, tamId = null) => { 
                await actions.addTask({ project_id: projectId, tam_customer_id: tamId, context_id: contextId, title: title, status: 'todo', priority: priority, gtd_list: gtd_list, is_today: is_today, subtasks: [], description: '' }); 
            };
            const addProject = async (cid, name, date) => { if(!name) return; const color = PROJECT_COLORS[Math.floor(Math.random() * PROJECT_COLORS.length)]; const { id } = await actions.addProject({ client_id: cid, name, due_date: date || '', tags: [], color, status: 'active' }); for(const t of MANDATORY_START_TASKS) await actions.addTask({ project_id: id, title: t, status: 'todo', priority: 'high', gtd_list: 'next', is_today: true, subtasks: [], description: '' }); };
            const toggleStatus = async (task) => { const newStatus = task.status === 'done' ? 'todo' : 'done'; await actions.updateTask(task.id, { status: newStatus }); if(newStatus === 'done' && task.project_id) { const p = projects.find(proj => proj.id == task.project_id); if(p?.status === 'closing') { setTimeout(() => { /* Check completion */ }, 500); } } };
            const initiateClosure = async (pid) => { if (!confirm('¿Iniciar el proceso de cierre? Se crearán tareas finales.')) return; const project = projects.find(p => p.id === pid); const isReopened = project.journal && project.journal.some(j => j.content.includes('Proyecto reabierto.')); await actions.updateProject(pid, { status: 'closing' }); if (isReopened) { await actions.addTask({ project_id: pid, title: 'Actualizar documentación', status: 'todo', priority: 'high', gtd_list: 'next', is_today: true, subtasks: [], description: '' }); } else { const closing = ['Enviar mail a soporte', 'Desactivar Kimai']; for(const t of closing) await actions.addTask({ project_id: pid, title: t, status: 'todo', priority: 'high', gtd_list: 'next', is_today: true, subtasks: [], description: '' }); } };
            const forceCloseProject = async (pid) => { if (!confirm('¿Cerrar el proyecto definitivamente? Se marcará como cerrado.')) return; await actions.updateProject(pid, { status: 'closed' }); };
            const reopenProject = async (pid) => { if (!confirm('¿Reabrir el proyecto? Pasará a estado activo.')) return; await actions.updateProject(pid, { status: 'active' }); await actions.updateProject(pid, { journal: [{ content: 'Proyecto reabierto.' }] }); };
            const deleteProject = async (id) => { const hasTasks = tasks.some(t => t.project_id == id); const msg = hasTasks ? 'Este proyecto tiene tareas. ¿Estás seguro de que quieres eliminarlo y todas sus tareas?' : '¿Estás seguro de eliminar este proyecto?'; if(confirm(msg)) { await actions.deleteProject(id); } };
            
            const [focusTask, setFocusTask] = useState(null); const [timerActive, setTimerActive] = useState(false); const [timeLeft, setTimeLeft] = useState(25 * 60);
            useEffect(() => { let interval; if (timerActive && timeLeft > 0) interval = setInterval(() => setTimeLeft(p => p - 1), 1000); else if (timeLeft === 0) setTimerActive(false); return () => clearInterval(interval); }, [timerActive, timeLeft]);
            
            const [search, setSearch] = useState('');
            const filteredTasks = tasks.filter(t => t.title.toLowerCase().includes(search.toLowerCase()) || projects.find(p => p.id == t.project_id)?.name.toLowerCase().includes(search.toLowerCase()));
            const myDayTasks = filteredTasks.filter(t => t.is_today && t.status !== 'done');
            
            // Reminder Popup Logic
            const [activeReminder, setActiveReminder] = useState(null);
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    tasks.forEach(t => {
                        if(t.gtd_list === 'waiting' && t.next_reminder && new Date(t.next_reminder) <= now && !activeReminder) {
                            setActiveReminder(t);
                        }
                    });
                }, 60000); // Check every minute
                return () => clearInterval(interval);
            }, [tasks, activeReminder]);

            const handleSnooze = (task) => {
                const freq = task.reminder_freq === 'daily' ? 1 : (task.reminder_freq === 'weekly' ? 7 : 30);
                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + freq);
                actions.updateTask(task.id, { next_reminder: nextDate.toISOString() });
                setActiveReminder(null);
            };

            const handleCompleteReminder = (task) => {
                toggleStatus(task);
                setActiveReminder(null);
            };

            if(loading) return <div className="h-screen flex items-center justify-center text-slate-500 bg-slate-50 dark:bg-slate-950">Cargando FocusDeck...</div>;

            return (
                <div className="flex h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-hidden font-sans transition-colors duration-300">
                    <aside className={`w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col ${sidebarOpen?'absolute z-20 h-full':'hidden md:flex'} transition-colors duration-300`}>
                        <div className="p-6 border-b border-slate-200 dark:border-slate-800 font-bold text-xl flex gap-2 items-center"><Icons.LayoutDashboard /> FocusDeck</div>
                        <nav className="p-4 space-y-2 flex-1 overflow-y-auto">
                            <div className="text-xs font-bold text-slate-500 uppercase px-4 mb-2">Principal</div>
                            <button onClick={()=>{setView('my-day');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'my-day' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.LayoutDashboard/> Mi Día</button>
                            <button onClick={()=>{setView('inbox');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'inbox' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.Inbox/> Bandeja Entrada</button>
                            <button onClick={()=>{setView('gtd');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'gtd' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.ListTodo/> GTD</button>
                            <button onClick={()=>{setView('contexts');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'contexts' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.Hash/> Contextos</button>
                            
                            <div className="text-xs font-bold text-slate-500 uppercase px-4 mt-6 mb-2">Gestión</div>
                            <button onClick={()=>{setView('projects');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'projects' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.FolderKanban/> Proyectos</button>
                            <button onClick={()=>{setView('clients');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'clients' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.Users/> Clientes</button>
                            <button onClick={()=>{setView('tam');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'tam' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.Briefcase/> Clientes TAM</button>
                            <button onClick={()=>{setView('all');setSidebarOpen(false)}} className={`w-full flex gap-3 px-4 py-3 rounded-lg ${view === 'all' ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`}><Icons.Inbox/> Todas</button>
                        </nav>
                        <div className="p-4 border-t border-slate-200 dark:border-slate-800">
                            <button onClick={()=>setDarkMode(!darkMode)} className="w-full flex items-center justify-between px-4 py-2 text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg mb-2 transition-colors"><div className="flex items-center gap-2"><Icons.Settings size={16}/> Tema</div>{darkMode?<Icons.Moon size={16}/>:<Icons.Sun size={16}/>}</button>
                            <div className="text-center text-xs text-slate-400 dark:text-slate-600">v5.5.2 Pro</div>
                        </div>
                    </aside>
                    <main className="flex-1 flex flex-col relative">
                        <div className="h-16 border-b border-slate-200 dark:border-slate-800 flex items-center px-4 justify-between bg-white/50 dark:bg-slate-950/50 backdrop-blur sticky top-0 z-10">
                            <button className="md:hidden" onClick={()=>setSidebarOpen(!sidebarOpen)}><Icons.Menu/></button>
                            <div className="relative w-64 mx-4"><Icons.Search className="absolute left-3 top-2.5 text-slate-400 dark:text-slate-600" size={18}/><input className="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-full py-2 pl-10 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
                            <div className="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-700 dark:text-slate-300">YO</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-4xl mx-auto h-full">
                                {view === 'my-day' && <MyDayView tasks={myDayTasks} allTasks={filteredTasks} projects={projects} clients={clients} contexts={contexts} tamCustomers={tamCustomers} onAddTask={addTaskWrapper} onToggleStatus={toggleStatus} onToggleToday={(t,e)=>{e.stopPropagation();actions.updateTask(t.id,{is_today:!t.is_today})}} onDelete={actions.deleteTask} onUpdateTask={actions.updateTask} onFocus={setFocusTask} onUpdateGTD={(t, l) => actions.updateTask(t.id, { gtd_list: l })} />}
                                {view === 'inbox' && <InboxView tasks={filteredTasks} projects={projects} clients={clients} contexts={contexts} tamCustomers={tamCustomers} onAddTask={addTaskWrapper} onToggleStatus={toggleStatus} onToggleToday={(t,e)=>{e.stopPropagation();actions.updateTask(t.id,{is_today:!t.is_today})}} onDelete={actions.deleteTask} onUpdateTask={actions.updateTask} onFocus={setFocusTask} onUpdateGTD={(t, l) => actions.updateTask(t.id, { gtd_list: l })} />}
                                {view === 'gtd' && <GTDView tasks={filteredTasks} projects={projects} clients={clients} contexts={contexts} tamCustomers={tamCustomers} onAddTask={addTaskWrapper} onToggleStatus={toggleStatus} onToggleToday={(t,e)=>{e.stopPropagation();actions.updateTask(t.id,{is_today:!t.is_today})}} onDelete={actions.deleteTask} onUpdateTask={actions.updateTask} onFocus={setFocusTask} onUpdateGTD={(t, l) => actions.updateTask(t.id, { gtd_list: l })} />}
                                {view === 'contexts' && <ContextsView tasks={filteredTasks} projects={projects} clients={clients} contexts={contexts} tamCustomers={tamCustomers} onAddContext={actions.addContext} onDeleteContext={actions.deleteContext} onAddTask={addTaskWrapper} onToggleStatus={toggleStatus} onToggleToday={(t,e)=>{e.stopPropagation();actions.updateTask(t.id,{is_today:!t.is_today})}} onDelete={actions.deleteTask} onUpdateTask={actions.updateTask} onFocus={setFocusTask} onUpdateGTD={(t, l) => actions.updateTask(t.id, { gtd_list: l })} />}
                                {view === 'all' && <AllTasksView tasks={filteredTasks} projects={projects} clients={clients} contexts={contexts} tamCustomers={tamCustomers} onToggleStatus={toggleStatus} onToggleToday={(t,e)=>{e.stopPropagation();actions.updateTask(t.id,{is_today:!t.is_today})}} onDelete={actions.deleteTask} onUpdateTask={actions.updateTask} onFocus={setFocusTask} onUpdateGTD={(t, l) => actions.updateTask(t.id, { gtd_list: l })} />}
                                {view === 'projects' && <ProjectsView clients={clients} projects={projects} tasks={tasks} onAddClient={actions.addClient} onDeleteClient={actions.deleteClient} onUpdateClient={actions.updateClient} onAddProject={addProject} onDeleteProject={deleteProject} onForceClose={forceCloseProject} onReopenProject={reopenProject} onAddTask={addTaskWrapper} onToggleStatus={toggleStatus} onToggleToday={(t,e)=>{e.stopPropagation();actions.updateTask(t.id,{is_today:!t.is_today})}} onInitiateClosure={initiateClosure} onUpdateJournal={(pid,c)=>actions.updateProject(pid,{journal:[{content:c}]})} />}
                                {view === 'clients' && <ClientsView clients={clients} projects={projects} onAddClient={actions.addClient} onUpdateClient={actions.updateClient} onDeleteClient={actions.deleteClient} />}
                                {view === 'tam' && <TamView tamCustomers={tamCustomers} onAddTamCustomer={actions.addTamCustomer} onDeleteTamCustomer={actions.deleteTamCustomer} />}
                            </div>
                        </div>
                    </main>
                    <FocusModal focusTask={focusTask} projects={projects} clients={clients} onClose={() => setFocusTask(null)} timerActive={timerActive} setTimerActive={setTimerActive} timeLeft={timeLeft} toggleTaskStatus={toggleStatus} />
                    <ReminderPopup task={activeReminder} onClose={() => setActiveReminder(null)} onSnooze={handleSnooze} onComplete={handleCompleteReminder} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
